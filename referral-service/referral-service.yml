server:
  port: 9023
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 1000
    connection-timeout: 20000
    max-http-form-post-size: 2MB
spring:
  datasource:
    url: jdbc:postgresql://20.116.218.195:5432/referral_db_dev
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ReferralServiceHikariCP-Dev
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        connection:
          provider_disables_autocommit: true
        hbm2ddl:
          create_namespaces: false
        temp:
          use_jdbc_metadata_defaults: false
        schema_update:
          unique_constraint_strategy: RECREATE_QUIETLY
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      repositories:
        enabled: false
      host: 20.116.218.195
      port: 6379
      password: ${REDIS_DEV_PASSWORD}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 5000ms
        shutdown-timeout: 100ms
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000
            logger-level: FULL
          agents-service:
            connect-timeout: 3000
            read-timeout: 8000
            logger-level: FULL
    consul:
      host: 20.116.218.195
      port: 8500
      scheme: https
      discovery:
        enabled: true
        service-name: referral-service
        health-check-interval: 15s
        health-check-timeout: 10s
        health-check-critical-timeout: 30s
        instance-id: referral-service-dev
        ip-address: null
        tags:
        - version=1.0.0-dev
        - environment=development
        - team=farm-to-market
        - service-type=microservice
  cache:
    type: redis
    redis:
      time-to-live: 1800000
      cache-null-values: false
      key-prefix: 'referral-service-dev:'
      use-key-prefix: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          issuer-uri: http://20.116.218.195:9020
          audiences:
          - dev-referral-service
      client:
        registration:
          referral-service:
            client-id: dev-referral-service-client
            client-secret: dev-secret-key
            authorization-grant-type: client_credentials
            scope: read,write
        provider:
          referral-service:
            token-uri: http://20.116.218.195:9020/oauth2/token
            authorization-uri: http://20.116.218.195:9020/oauth2/authorize
            user-info-uri: http://20.116.218.195:9020/oauth2/userinfo
            jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
  application:
    name: referral-service
  kafka:
    bootstrap-servers: 20.116.218.195:9092
    producer:
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      compression-type: gzip
      linger-ms: 5
      max-in-flight-requests-per-connection: 5
      properties:
        enable.idempotence: true
        request.timeout.ms: 30000
kafka:
  topics:
    referral-code-created: ${KAFKA_TOPIC_REFERRAL_CODE_CREATED:referral.code.created}
    referral-code-expired: ${KAFKA_TOPIC_REFERRAL_CODE_EXPIRED:referral.code.expired}
    referral-created: ${KAFKA_TOPIC_REFERRAL_CREATED:referral.created}
    referral-converted: ${KAFKA_TOPIC_REFERRAL_CONVERTED:referral.converted}
    reward-earned: ${KAFKA_TOPIC_REWARD_EARNED:reward.earned}
    reward-redeemed: ${KAFKA_TOPIC_REWARD_REDEEMED:reward.redeemed}
    transaction-processed: ${KAFKA_TOPIC_TRANSACTION_PROCESSED:transaction.processed}
    admin-alerts: ${KAFKA_TOPIC_ADMIN_ALERTS:admin.alerts}
services:
  agents-service:
    url: https://20.116.218.195:9001
    timeout: 10000
    retry:
      max-attempts: 3
      delay: 1000
  notification-service:
    url: https://20.116.218.195:8082
    timeout: 15000
    retry:
      max-attempts: 3
      delay: 2000
business:
  referral:
    code:
      length: 8
      expiry-days: 365
      max-uses: 100
    reward:
      min-purchase-amount: 25.0
      default-reward-percentage: 0.05
      max-reward-amount: 100.0
    validation:
      agent-cache-ttl: 900000
      max-validation-retries: 3
    expiration:
      warning-days: 7,1
      batch-size: 25
      max-processing-time: 300000
      cron: 0 0 */2 * * ?
      warning-cron: 0 0 */12 * * ?
      cleanup-cron: 0 0 3 * * ?
  bonus:
    base-amount: 5.0
    performance-threshold: 5
    loyalty-days-threshold: 90
    milestone-increments: 3
  fraud:
    risk-threshold: ${FRAUD_RISK_THRESHOLD:70}
    max-referrals-per-day: ${FRAUD_MAX_REFERRALS_PER_DAY:10}
    self-referral-score: ${FRAUD_SELF_REFERRAL_SCORE:100}
    velocity-score: ${FRAUD_VELOCITY_SCORE:30}
    same-ip-score: ${FRAUD_SAME_IP_SCORE:40}
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  environment: ${spring.profiles.active}
  release: ${project.version:1.0.0}
  send-default-pii: false
  attach-stacktrace: true
  debug: ${SENTRY_DEBUG:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: always
      show-components: always
      group:
        liveness:
          include: diskSpace,ping
        readiness:
          include: db,redis,consul
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    defaults:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true
    consul:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    com.i4u.synthi_ai.referralservice: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.cloud.consul: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    io.lettuce.core: DEBUG
    root: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
