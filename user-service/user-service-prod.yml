# Production overrides for user-service

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/farmstomarket_users
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

user-service:
  rate-limiting:
    login-attempts: 3
    login-window: 10m
    registration-attempts: 2
    registration-window: 2h
  session:
    max-concurrent-sessions: 2
    timeout: 15m
