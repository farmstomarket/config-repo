spring:
  application:
    name: user-service
  
  # Database Configuration (récupérée depuis Config Server)
  datasource:
    url: jdbc:postgresql://postgres.ndinga-eats-platform.svc.cluster.local:5432/ndinga_eats_users
    username: user_service
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  
  # Redis Configuration
  redis:
    host: redis.ndinga-eats-platform.svc.cluster.local
    port: 6379
    database: 1
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  # Kafka Configuration
  kafka:
    bootstrap-servers: kafka.ndinga-eats-platform.svc.cluster.local:9092
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    topics:
      user-created: user.created
      user-updated: user.updated
      user-deleted: user.deleted

# Configuration spécifique User Service
ndinga-eats:
  user:
    password:
      min-length: 8
      require-special-chars: true
      require-uppercase: true
      require-lowercase: true
      require-numbers: true
    verification:
      email-required: true
      phone-required: true
      verification-token-expiry: 24h
    session:
      timeout: 30m
      max-concurrent-sessions: 3
    rate-limiting:
      enabled: true
      login-attempts: 5
      login-window: 15m
      registration-attempts: 3
      registration-window: 1h
  
  external-services:
    auth-service:
      url: http://auth-service:8081
      timeout: 5s
      retry-attempts: 3
    notification-service:
      url: http://notification-service:8083
      timeout: 10s
      retry-attempts: 2
    email-service:
      url: http://email-service:8087
      timeout: 15s
      retry-attempts: 3

# Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
    instances:
      authService:
        failure-rate-threshold: 30
      notificationService:
        base-config: default
      emailService:
        wait-duration-in-open-state: 60s