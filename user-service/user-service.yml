server:
  port: 9002

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5000}/farmstomarket_users
    username: ${DB_USERNAME}
    password: '{cipher}3d7032236b64e75640d412229f001bb5b7c202ad191db5f360848356e26e8dc00a4be4d23d9dcb6b2cb107545f4a7aa8'
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      keepalive-time: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      database: 1
      repositories:
        enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://oauth2-server.synthi-ai.com/.well-known/jwks.json}
          audiences:
            - ${FUSIONAUTH_APP_ID}

  kafka:
    consumer:
      group-id: user-service-group

fusionauth:
  api-key: '{cipher}891cfc03e60dd029ff5da7674d89f3519c431077e40f737720ca2e5fd702cd495ba3fe16912ee6e88047a98c1b5a46252138ef337fea15796067efdecec7920bc6e7312414379914906e19e5c2fa70bd'
  base-url: ${FUSIONAUTH_BASE_URL:${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}}
  application-id: ${FUSIONAUTH_APP_ID}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: '{cipher}deaf89da485552c3d83ffe687b2c148a8f6e32a73c58c388c67f1aa20f5ae2b7c5cab56f12935475f77ef07c4a5f25f14b04c2c81ae4045df3bee20929a23bff'
  verification:
    service-sid: ${TWILIO_VERIFICATION_SERVICE_SID}

rate:
  limit:
    max-requests: 100
    window-ms: 60000

cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:4200,https://app.farmstomarket.io}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: '*'
  exposed-headers: Authorization,X-Correlation-Id
  allow-credentials: false
  max-age: 3600

resilience4j:
  circuitbreaker:
    instances:
      authService:
        base-config: default
        failure-rate-threshold: 30
      notificationService:
        base-config: default
      emailService:
        base-config: default
        wait-duration-in-open-state: 60s

app:
  kafka:
    topics:
      user:
        created: user.created
        updated: user.updated
        deleted: user.deleted
        verified: user.verified
        password-changed: user.password.changed
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000

user-service:
  password:
    min-length: 10
    require-special-chars: true
    require-uppercase: true
    require-lowercase: true
    require-numbers: true
  verification:
    email-required: true
    phone-required: false
    verification-token-expiry: 1h
  session:
    timeout: 30m
    max-concurrent-sessions: 3
