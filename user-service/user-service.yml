server:
  port: 9002
spring:
  datasource:
    url: jdbc:postgresql://20.116.218.195:5432/farmstomarket_users_dev
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      keepalive-time: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  cache:
    type: redis
    cache-names:
    - buckets
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      repositories:
        enabled: false
      database: 1
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://oauth2-server.synthi-ai.com/.well-known/jwks.json}
          audiences:
          - ${FUSIONAUTH_APP_ID}
      client:
        registration:
          fusionauth:
            client-id: ${FUSIONAUTH_CLIENT_ID}
            client-secret: ${FUSIONAUTH_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope:
            - openid
            - email
            - profile
            - phone
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
        provider:
          fusionauth:
            authorization-uri: ${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}/oauth2/authorize
            token-uri: ${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}/oauth2/token
            user-info-uri: ${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}/oauth2/userinfo
            jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://oauth2-server.synthi-ai.com/.well-known/jwks.json}
            user-name-attribute: phone
  application:
    name: user-service
  kafka:
    consumer:
      group-id: user-service-group
fusionauth:
  apiKey: ${FUSIONAUTH_API_KEY}
  applicationId: ${FUSIONAUTH_APP_ID}
  baseUrl: ${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}
  verification:
    service-sid: ${TWILIO_VERIFICATION_SERVICE_SID}
cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}
  allowed-methods: ${CORS_ALLOWED_METHODS:*}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      authService:
        base-config: default
        failure-rate-threshold: 30
      notificationService:
        base-config: default
      emailService:
        base-config: default
        wait-duration-in-open-state: 60s
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 5s
app:
  kafka:
    topics:
      user:
        created: user.created
        updated: user.updated
        deleted: user.deleted
        verified: user.verified
        password-changed: user.password.changed
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
user-service:
  password:
    min-length: 10
    require-special-chars: true
    require-uppercase: true
    require-lowercase: true
    require-numbers: true
  verification:
    email-required: true
    phone-required: false
    verification-token-expiry: 1h
  session:
    timeout: 30m
    max-concurrent-sessions: 3
  rate-limiting:
    enabled: true
    login-attempts: 20
    login-window: 15m
    registration-attempts: 10
    registration-window: 1h
