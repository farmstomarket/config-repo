server:
  port: 9002
spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://dev-postgres.synthi-ai.org:5432/farmstomarket_users_dev
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  data:
    redis:
      database: 1
      timeout: 2000ms
  kafka:
    consumer:
      group-id: user-service-group
app:
  kafka:
    topics:
      user:
        created: user.created
        updated: user.updated
        deleted: user.deleted
        verified: user.verified
        password-changed: user.password.changed
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
user-service:
  password:
    min-length: 10
    require-special-chars: true
    require-uppercase: true
    require-lowercase: true
    require-numbers: true
  verification:
    email-required: true
    phone-required: false
    verification-token-expiry: 1h
  session:
    timeout: 30m
    max-concurrent-sessions: 3
  rate-limiting:
    enabled: true
    login-attempts: 20
    login-window: 15m
    registration-attempts: 10
    registration-window: 1h
resilience4j:
  circuitbreaker:
    instances:
      authService:
        base-config: default
        failure-rate-threshold: 30
      notificationService:
        base-config: default
      emailService:
        base-config: default
        wait-duration-in-open-state: 60s
