server:
  port: 9030
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,text/html,text/plain
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cache:
    type: redis
    cache-names:
    - buckets
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@20.116.218.195:27017/marketplace_db_dev
      auto-index-creation: true
    redis:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
      password: ${REDIS_DEV_PASSWORD}
      timeout: 30000
      connect-timeout: 2000
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    connection-timeout: ${ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:30s}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-marketplace-service
  kafka:
    consumer:
      group-id: marketplace-service-group-dev
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
        fetch.min.bytes: 1
        max.poll.records: 100
        enable.auto.commit: false
    listener:
      concurrency: 2
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties:
        retry.backoff.ms: 1000
  application:
    name: marketplace-service
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      config:
        enabled: false
        format: YAML
        retry:
          max-attempts: 3
          max-interval: 1000
          multiplier: 1.1
      discovery:
        enabled: true
        service-id: marketplace-service-dev
        register: true
        instance-id: marketplace-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  search:
    engine: ${SEARCH_ENGINE:elasticsearch}
  kafka:
    topics:
      marketplace:
        product:
          published: marketplace.product.published.dev
          updated: marketplace.product.updated.dev
          status-changed: marketplace.product.status.changed.dev
          viewed: marketplace.product.viewed.dev
          sold: marketplace.product.sold.dev
          enrichment: marketplace.product.enrichment.dev

        order:
          created: marketplace.order.created.dev
          updated: marketplace.order.updated.dev
        notification:
          general: marketplace.notification.general.dev

      consumer:
        harvest:
          events: harvest-events
        plantation:
          created: crop.plantation.created.dev

          updated: crop.plantation.updated.dev

          status-changed: crop.plantation.status-changed.dev

        farm:
          events: farm-events
        farming-status:
          updated: farming-status-updated
          crop-health-changed: crop-health-changed
          growth-stage-updated: growth-stage-updated
          alert-triggered: farming-alert-triggered
        livestock:
          updated: livestock.entity.updated.dev
        crop:
          updated: crop.entity.updated.dev
    default-replicas: ${KAFKA_DEFAULT_REPLICAS:3}
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true
  compression:
    request:
      enabled: true
    response:
      enabled: true
resilience4j:
  circuitbreaker:
    instances:
      farmingStatusService:
        registerHealthIndicator: true
        slidingWindowSize: 50
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 60
        eventConsumerBufferSize: 10
      livestockManagementService:
        registerHealthIndicator: true
        slidingWindowSize: 50
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 60
        eventConsumerBufferSize: 10
  retry:
    instances:
      farmingStatusService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
      livestockManagementService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    mongodb:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    org.springframework.cloud.openfeign: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
