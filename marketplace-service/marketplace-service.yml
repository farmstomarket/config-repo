server:
  port: 9020
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,text/html,text/plain
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cache:
    type: redis
    cache-names:
    - buckets
    - categories
    - products
    - textSearchCache
    - typeCategorySearchCache
    - searchSuggestionsCache
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/marketplace_db}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 300000
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2000}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    connection-timeout: ${ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:30s}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json
  kafka:
    consumer:
      group-id: marketplace-group
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    listener:
      concurrency: 3
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties: null
  application:
    name: marketplace-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/farmstomarket_marketplace
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  cloud:
    consul:
      host: consul.synthi-ai.org
      port: 443
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: marketplace-service
        register: true
        instance-id: marketplace-service
        health-check-interval: 10s
        tags:
        - version=1.0
        - environment=production
        - secure=true
  task:
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 100
        keep-alive: 60s
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  search:
    engine: ${SEARCH_ENGINE:elasticsearch}
  kafka:
    topics:
      marketplace:
        product:
          published: marketplace.product.published
          updated: marketplace.product.updated
          status-changed: marketplace.product.status.changed
          viewed: marketplace.product.viewed
          sold: marketplace.product.sold
          enrichment: marketplace.product.enrichment
          listed: marketplace.product.listed
          delisted: marketplace.product.delisted
          price-changed: marketplace.product.price.changed
        order:
          created: marketplace.order.created
          updated: marketplace.order.updated
          confirmed: marketplace.order.confirmed
          cancelled: marketplace.order.cancelled
          completed: marketplace.order.completed
        notification:
          general: marketplace.notification.general
        payment:
          initiated: marketplace.payment.initiated
          completed: marketplace.payment.completed
          failed: marketplace.payment.failed
        review:
          submitted: marketplace.review.submitted
          moderated: marketplace.review.moderated
      consumer:
        harvest:
          events: harvest-events
        plantation:
          created: crop.plantation.created
          updated: crop.plantation.updated
          status-changed: crop.plantation.status-changed
        farm:
          events: farm-events
        farming-status:
          updated: farming-status-updated
          crop-health-changed: crop-health-changed
          growth-stage-updated: growth-stage-updated
          alert-triggered: farming-alert-triggered
        livestock:
          updated: livestock.entity.updated
        crop:
          updated: crop.entity.updated
      inventory:
        updated: inventory.stock.updated
        low-stock: inventory.stock.low
      harvest:
        available: harvest.harvest.available
    default-replicas: ${KAFKA_DEFAULT_REPLICAS:3}
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true
  compression:
    request:
      enabled: true
    response:
      enabled: true
resilience4j:
  circuitbreaker:
    instances:
      farmingStatusService:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      livestockManagementService:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      paymentService:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
      inventoryService:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      farmingStatusService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
      livestockManagementService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
  timelimiter:
    instances:
      paymentService:
        timeoutDuration: 30s
      inventoryService:
        timeoutDuration: 5s
marketplace:
  pricing:
    commission-rate: 0.05
    minimum-order-amount: 10.0
    maximum-order-amount: 10000.0
  inventory:
    auto-reserve: true
    reserve-timeout-minutes: 15
  notifications:
    low-stock-threshold: 10
    order-confirmation-timeout-minutes: 30
payment:
  providers:
    stripe:
      public-key: ${STRIPE_PUBLIC_KEY}
      secret-key: ${STRIPE_SECRET_KEY}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    paypal:
      client-id: ${PAYPAL_CLIENT_ID}
      client-secret: ${PAYPAL_CLIENT_SECRET}
      sandbox: false
minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME:marketplace}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600
management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
logging:
  level:
    root: WARN
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    com.i4u.synthiai: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  config: classpath:logback-spring.xml
