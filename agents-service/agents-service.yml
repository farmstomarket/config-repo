server:
  port: 9001

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5000}/farmstomarket_agents
    username: ${DB_USERNAME}
    password: '{cipher}ca39319523d6a8d817c8b591e855affdf0d9ffd66d107b9fb9e58bc874390819530b7f79d077d8cf871b59893b040fd9'
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      database: 2
      repositories:
        enabled: false
      password: '{cipher}573d10ef45aeaa30d317077e11408b07c37597c10fedaffdb2dd406bd276e0bb'

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://oauth2-server.synthi-ai.com/.well-known/jwks.json}
          audiences:
            - ${FUSIONAUTH_APP_ID}

  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        service-name: agents-service
        service-id: agents-service
        register: true
        instance-id: agents-service-${random.value}
        health-check-interval: 10s
        tags:
          - version=1.0

fusionauth:
  apiKey: '{cipher}b4dcabe48be74cb17ac5d9d102000b2c2c92616e2cabae686d7ee0bd35efbd51fbfc82c0c4dda85832595d9dbcc1c6998552039f27fed92e06ebd22d73e2e9c2be4120be4ad3144e97bf53172c74ca87'
  applicationId: ${FUSIONAUTH_APP_ID}
  baseUrl: ${FUSIONAUTH_BASE_URL:${OAUTH2_ISSUER_URI:https://oauth2-server.synthi-ai.com}}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: '{cipher}7ebd17a056849ab00a70a55717a55a9ed27c52d79cf48d2eb24830b1320d1ff504983a79476e58f61adc6f6be42669ec9f4ed6ef0fd3330a7f7a68c799cb38f3'
  verification:
    service-sid: ${TWILIO_VERIFICATION_SERVICE_SID}

rate:
  limit:
    max-requests: 100
    window-ms: 60000

cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:4200,https://app.farmstomarket.io}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: '*'
  exposed-headers: Authorization,X-Correlation-Id
  allow-credentials: false
  max-age: 3600

resilience4j:
  circuitbreaker:
    instances:
      fusionAuthService:
        base-config: default
        failure-rate-threshold: 30
      twilioService:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms,100ms,200ms,500ms

logging:
  level:
    root: INFO
    com.i4u.synthi_ai: DEBUG
    org.springframework.security: INFO
  config: classpath:logback-spring.xml
