# Production overrides for payment-service

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/farmstomarket_payments
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

payment:
  providers:
    stripe:
      environment: production
    paypal:
      environment: production

management:
  tracing:
    sampling:
      probability: 0.1
  metrics:
    distribution:
      sla:
        http.server.requests: 50ms,100ms,200ms,500ms,2000ms
