server:
  port: 9003
spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://20.116.218.195:${DB_PORT:5000}/farmstomarket_auth_dev
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  data:
    redis:
      database: 3
      timeout: 2000ms
  kafka:
    consumer:
      group-id: auth-service-group
app:
  kafka:
    topics:
      auth:
        login: auth.login.success${KAFKA_TOPIC_SUFFIX:.dev}


        logout: auth.logout${KAFKA_TOPIC_SUFFIX:.dev}


        token-revoked: auth.token.revoked${KAFKA_TOPIC_SUFFIX:.dev}


        failed-attempt: auth.login.failed${KAFKA_TOPIC_SUFFIX:.dev}


    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
auth-service:
  token:
    revocation-cache-ttl: 1h
  rate-limiting:
    enabled: true
    login-attempts: 50
    window: 1m
resilience4j:
  circuitbreaker:
    instances:
      oauth2IdentityService:
        base-config: default
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
