# ══════════════════════════════════════════════════════════════════════════════
# Staging profile overrides — production-like config, non-production data.
# ══════════════════════════════════════════════════════════════════════════════

spring:
  cloud:
    consul:
      host: staging-consul.synthi-ai.org
      port: 443
      scheme: https
      discovery:
        tags:
          - environment=staging

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    listener:
      concurrency: 2

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://staging-oauth2.synthi-ai.com
          jwk-set-uri: https://staging-oauth2.synthi-ai.com/.well-known/jwks.json

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://staging-app.farmstomarket.io}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  exposed-headers: "*"
  allow-credentials: true
  max-age: 3600

management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.2
  metrics:
    tags:
      environment: staging

logging:
  level:
    root: INFO
    com.i4u.synthi_ai: INFO
    org.springframework.security: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
