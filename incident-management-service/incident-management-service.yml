server:
  port: 8085
spring:
  application:
    name: incident-management-service
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@20.116.218.195:27017/incident_management_dev
      database: incident_management_dev
    redis:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 0
      password: ${REDIS_DEV_PASSWORD}
  kafka:
    consumer:
      group-id: incident-management-service-dev
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.incidentmanagmentservice
    bootstrap-servers: 20.116.218.195:9092
    producer:
      acks: all
      retries: 3
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: incident-management-service-dev
        instance-id: incident-management-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-incident-management-service
grpc:
  server:
    port: 9083
  client:
    shipment-tracking-service:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 9081
    transport-service:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 9082
  topics:
    incident:
      created: incident.created
      updated: incident.updated
      resolved: incident.resolved
      assigned: incident.assigned
      closed: incident.closed
      escalated: incident.escalated
    event:
      vehicle-breakdown: incident.vehicle.breakdown
      delay-reported: incident.delay.reported
      road-closure: incident.road.closure
      weather: incident.weather
integration:
  weather-api:
    url: https://api.weather.com
    api-key: dev-weather-api-key
  traffic-api:
    url: https://api.traffic.com
    api-key: dev-traffic-api-key
resilience4j:
  circuitbreaker:
    instances:
      shipmentService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
      transportService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  retry:
    instances:
      shipmentService:
        maxAttempts: 3
        waitDuration: 1s
      transportService:
        maxAttempts: 3
        waitDuration: 1s
kafka:
  topics:
    incident-created: incident.created.dev
    incident-updated: incident.updated.dev
    incident-resolved: incident.resolved.dev
    incident-assigned: incident.assigned.dev
    incident-closed: incident.closed.dev
    incident-vehicle-breakdown: incident.vehicle.breakdown.dev
    incident-delay-reported: incident.delay.reported.dev
    incident-road-closure: incident.road.closure.dev
    incident-weather: incident.weather.dev
management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai.incidentmanagmentservice: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
