server:
  port: 9016
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
spring:
  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME}:'{cipher}210d8631932413727dcdf6d03d6157c07a1c9ff24aab1af5d563208fab0ab1e5f88ae8857cc769aa5a9354560375a7ed'@20.116.218.195:27017/media_storage_db_dev
      auto-index-creation: true
    redis:
      cluster:
        nodes:
        - ${REDIS_NODE_1:20.116.218.195:7001}
        - ${REDIS_NODE_2:20.116.218.195:7002}
        - ${REDIS_NODE_3:20.116.218.195:7003}
      password: '{cipher}dc5b3a5e7294088405d8f3d46c34a3ae19b1e03bf74bd0fa088592b539276878'
      timeout: 30000
      connect-timeout: 2000
      lettuce:
        pool:
          max-active: 5
          max-wait: -1ms
          max-idle: 4
          min-idle: 1
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
  kafka:
    consumer:
      group-id: media-storage-service
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties: null
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          issuer-uri: http://20.116.218.195:9020
          audiences:
          - dev-media-storage-service
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 250MB
      enabled: true
  application:
    name: media-storage-service
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: media-storage-service-dev
        instance-id: media-storage-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
minio:
  endpoint: https://20.116.218.195:9000
  access-key: '{cipher}8ccb1476737d0162021c99626cec64a0ef70e682ddf17230dbd606a56a01e3ec'
  secret-key: '{cipher}dcbe87308fe521193ffcb0050c91e4c93b3a84c480058a5ecb66999bebcfd9bb'
  bucket:
    name: media-files-dev
    auto-create: true
media:
  processing:
    max-concurrent-jobs: 2
    ffmpeg:
      executable-path: ffmpeg
      timeout-seconds: 300
      temp-directory: /tmp/media-processing-dev
    thumbnail:
      max-width: 200
      max-height: 200
      quality: 0.7
    video:
      max-duration-seconds: 1800
      supported-formats:
      - mp4
      - avi
      - mov
      - wmv
      - mkv
      - flv
      - webm
      output-format: mp4
      codec: h264
      bitrate: 500k
      resolutions:
      - 240
      - 360
      - 480
      - 720
      frame-rate: 30
    audio:
      supported-formats:
      - mp3
      - wav
      - aac
      - ogg
      - m4a
      - flac
      output-format: mp3
      bitrate: 128k
      sample-rate: 44100
    image:
      max-resolution: 2048x2048
      supported-formats:
      - jpg
      - jpeg
      - png
      - gif
      - webp
      - bmp
      - tiff
      output-format: webp
      quality: 80
    document:
      max-size-mb: 25
      supported-formats:
      - pdf
      - doc
      - docx
      - txt
      - rtf
  storage:
    base-url: ${MEDIA_BASE_URL:http://localhost:9016}
    quotas:
      default-user-quota-gb: 2
      premium-user-quota-gb: 10
    cleanup:
      temp-files-retention-hours: 12
      deleted-files-retention-days: 7
app:
  kafka:
    consumer-topics:
      imagery-processed: imagery.plantation.processed



    topics:
      media-uploaded: media.file.uploaded



      media-processing: media.file.processing



      media-accessed: media.file.accessed



      media-deleted: media.file.deleted



resilience4j:
  circuitbreaker:
    instances:
      minio:
        register-health-indicator: true
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: count_based
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
      mongodb:
        register-health-indicator: true
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: count_based
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
  retry:
    instances:
      minio:
        max-attempts: 3
        wait-duration: 1s
      mongodb:
        max-attempts: 3
        wait-duration: 500ms
management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai.mediastorageservice: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    io.minio: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
