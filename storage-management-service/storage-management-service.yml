spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST}
      port: 6379
      timeout: 300000
      connect-timeout: 2000
      repositories:
        enabled: false
      password: ${REDIS_PASSWORD}
  cache:
    type: redis
    redis:
      time-to-live: 3600
      cache-null-values: false
  kafka:
    consumer:
      group-id: storage-management-group
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties: null
    listener:
      concurrency: 3
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json
          issuer-uri: ${OAUTH2_ISSUER:https://oauth2-server.synthi-ai.com}
  main:
    allow-bean-definition-overriding: true
  application:
    name: storage-management-service
  cloud:
    consul:
      host: consul.synthi-ai.org
      port: 443
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: storage-management-service
        register: true
        instance-id: storage-management-service
        health-check-interval: 10s
        tags:
        - version=1.0
        - environment=production
        - secure=true
  task:
    execution:
      pool:
        core-size: 15
        max-size: 30
        queue-capacity: 200
        keep-alive: 60s
    scheduling:
      pool:
        size: 10
server:
  port: 9030
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
app:
  kafka:
    topic:
      lot-created: lot.created
      lot-exited: lot.exited
      alert-triggered: alert.triggered
      reservation-accepted: reservation.accepted
    consumer-topics:
      harvest-completed: crop.harvest.completed
    topics:
      storage:
        warehouse:
          capacity:
            warning: warehouse.capacity.warning
          status:
            changed: warehouse.status.changed
        facility:
          created: storage.facility.created
          updated: storage.facility.updated
          capacity-changed: storage.facility.capacity.changed
        inventory:
          received: storage.inventory.received
          moved: storage.inventory.moved
          reserved: storage.inventory.reserved
          released: storage.inventory.released
          expired: storage.inventory.expired
        temperature:
          monitored: storage.temperature.monitored
          alert: storage.temperature.alert
        humidity:
          monitored: storage.humidity.monitored
          alert: storage.humidity.alert
        quality:
          checked: storage.quality.checked
          degraded: storage.quality.degraded
      harvest:
        ready: harvest.harvest.completed
        quality: harvest.quality.recorded
      shipment:
        prepared: storage.shipment.prepared
        picked: storage.shipment.picked
      consumer:
        harvest-events: harvest.*
        marketplace-events: marketplace.order.*
    dlq:
      suffix: .dlq
      max-retries: 3
      retry-suffix: .retry
      retry-delay: 5000
  webhook:
    svix:
      api-key: ${SVIX_API_KEY}
      endpoint: ${SVIX_ENDPOINT:https://webhooks.synthi-ai.org}
      app-id: ${SVIX_APP_ID:app_1234567890}
    events: lot.created,warehouse.near-full,lot.expired,reservation.created,warehouse.updated,warehouse.deleted,warehouse.status-changed,alert.triggered
  services:
    notification: ${NOTIFICATION_SERVICE_URL:http://notification-service/api/v1}
    harvest: ${HARVEST_SERVICE_URL:http://harvest-management-service/api/v1}
    crop: ${CROP_SERVICE_URL:http://crop-management-service/api/v1}
  business:
    warehouse:
      capacity:
        warning-threshold: ${WAREHOUSE_WARNING_THRESHOLD:0.85}
        critical-threshold: ${WAREHOUSE_CRITICAL_THRESHOLD:0.95}
        info-threshold: ${WAREHOUSE_INFO_THRESHOLD:0.80}
    alert:
      thresholds:
        capacity:
          info: ${ALERT_CAPACITY_INFO:80.0}
          warning: ${ALERT_CAPACITY_WARNING:90.0}
          critical: ${ALERT_CAPACITY_CRITICAL:95.0}
        environmental:
          deviation:
            warning: ${ALERT_ENV_WARNING:10.0}
            critical: ${ALERT_ENV_CRITICAL:20.0}
      escalation:
        hours-threshold: ${ALERT_ESCALATION_HOURS:24}
      upcoming-exit:
        days-threshold: ${UPCOMING_EXIT_DAYS:5}
        notification-threshold: ${UPCOMING_EXIT_NOTIFICATION_DAYS:2}
    auto:
      store:
        enabled: ${AUTO_STORE_ENABLED:false}
        default-storage-months: ${DEFAULT_STORAGE_MONTHS:3}
  security:
    allowed-origins: ${ALLOWED_ORIGINS:*}
    required-scopes:
      warehouse:
        read: warehouse.read
        write: warehouse.write
      lot:
        read: lot.read
        write: lot.manage
      reservation:
        read: reservation.read
        write: reservation.create
storage:
  facilities:
    default-capacity-kg: 10000
    temperature-controlled: true
    humidity-controlled: true
    security-enabled: true
  monitoring:
    temperature:
      check-interval-minutes: 5
      min-celsius: 2
      max-celsius: 8
      alert-threshold-celsius: 1
    humidity:
      check-interval-minutes: 10
      min-percentage: 85
      max-percentage: 95
      alert-threshold-percentage: 2
    quality:
      check-interval-hours: 24
      deterioration-factors:
      - temperature
      - humidity
      - time
      - handling
  inventory:
    fifo-enabled: true
    batch-tracking: true
    expiry-tracking: true
    quality-grades:
    - PREMIUM
    - STANDARD
    - SECONDS
    - REJECT
    auto-reserve: true
    reserve-timeout-hours: 24
  automation:
    auto-sort: true
    robotic-handling: false
    conveyor-system: true
    barcode-scanning: true
    rfid-tracking: false
iot:
  sensors:
    temperature:
      brand: SenseAir
      model: TempLogger
      protocol: MQTT
      topic: storage/temperature
    humidity:
      brand: SenseAir
      model: HumidityLogger
      protocol: MQTT
      topic: storage/humidity
    weight:
      brand: LoadCell
      model: ScaleSystem
      protocol: HTTP
      endpoint: /api/weight
  connectivity:
    mqtt:
      broker-url: ${MQTT_BROKER_URL}
      username: ${MQTT_USERNAME}
      password: ${MQTT_PASSWORD}
      client-id: storage-management-service
      keep-alive: 60
    http:
      timeout-seconds: 30
      retry-attempts: 3
integrations:
  weather:
    api-key: ${WEATHER_API_KEY}
    provider: openweathermap
    check-interval-hours: 1
  blockchain:
    enabled: false
    network: ethereum
    contract-address: ${BLOCKCHAIN_CONTRACT_ADDRESS}
  cold-chain:
    certification: ISO22000
    compliance-tracking: true
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600
management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
resilience4j:
  circuitbreaker:
    instances:
      iotSensors:
        slidingWindowSize: 50
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 30s
      weatherApi:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
  timelimiter:
    instances:
      iotSensors:
        timeoutDuration: 10s
      weatherApi:
        timeoutDuration: 30s
logging:
  level:
    root: WARN
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    com.i4u.synthiai: INFO
    org.springframework.security: WARN
    org.mongodb.driver: WARN
    org.eclipse.paho.client.mqttv3: INFO
  config: classpath:logback-spring.xml
