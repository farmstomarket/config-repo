spring:
  application:
    name: shipment-tracking-service
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@20.116.218.195:27017/shipment_tracking_dev
      auto-index-creation: true
    redis:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
      timeout: 2000
      password: ${REDIS_DEV_PASSWORD}
  kafka:
    consumer:
      group-id: shipment-tracking-group-dev
      properties:
        spring.json.trusted.packages: com.i4u.*
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties:
        spring.json.type.mapping: shipmentEvent:com.agriconnect.shipmenttracking.kafka.model.ShipmentEvent
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false
  datasource:
    url: jdbc:postgresql://20.116.218.195:${DB_PORT:5432}/timescaledb_dev
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: true
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: shipment-tracking-service-dev
        instance-id: shipment-tracking-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-shipment-tracking-service
server:
  port: 8084
  servlet:
    context-path: /api/v1
resilience4j:
  circuitbreaker:
    instances:
      traccarService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      transportService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      deliveryService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      kafkaProducer:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
      graphHopperService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      traccarService:
        maxRetryAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
      transportService:
        maxRetryAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
      deliveryService:
        maxRetryAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
      kafkaProducer:
        maxRetryAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
kafka:
  topics:
    shipment-created: shipment.created.dev
    shipment-location-updated: shipment.location_updated.dev
    shipment-status-updated: shipment.status_updated.dev
    shipment-delivered: shipment.delivered.dev
    shipment-delayed: shipment.delayed.dev
    shipment-incident: shipment.incident.dev
    shipment-tracking-events: shipment-tracking-events
    route-optimization-events: route-optimization-events
    notification-events: notification-events
    driver-management-events: driver-management-events
    transport-management-events: transport-management-events
  consumer:
    topics:
      transport-location-updated: transport.vehicle_location_updated.dev
      transport-status-changed: transport.vehicle_status_changed.dev
      delivery-assigned: delivery.assigned.dev
      delivery-completed: delivery.completed.dev
      incident-reported: incident.reported.dev
grpc:
  server:
    port: 9093
  client:
    transport-service:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 9092
    delivery-service:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 9095
    transport-management:
      host: ${GRPC_TRANSPORT_MGMT_HOST:localhost}
      port: ${GRPC_TRANSPORT_MGMT_PORT:9001}
    route-optimization:
      host: ${GRPC_ROUTE_OPT_HOST:localhost}
      port: ${GRPC_ROUTE_OPT_PORT:9002}
    driver-management:
      host: ${GRPC_DRIVER_MGMT_HOST:localhost}
      port: ${GRPC_DRIVER_MGMT_PORT:9003}
    notification:
      host: ${GRPC_NOTIFICATION_HOST:localhost}
      port: ${GRPC_NOTIFICATION_PORT:9004}
traccar:
  api-url: https://20.116.218.195:8082/api
  websocket-url: wss://20.116.218.195:8082/api/socket
  admin:
    email: dev-admin@agriconnect.com
    password: dev-password
  device-category: delivery-dev
  update-interval-seconds: 30
  connection-timeout: 5000
  read-timeout: 30000
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    mongodb:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.agriconnect.shipmenttracking: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
