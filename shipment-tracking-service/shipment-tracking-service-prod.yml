server:
  port: 9029

spring:
  application:
    name: shipment-tracking-service

  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST}
      port: 6379
      timeout: 300000
      password: ${REDIS_PASSWORD}

  cloud:
    consul:
      host: consul.synthi-ai.org
      port: 443
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: shipment-tracking-service
        register: true
        instance-id: shipment-tracking-service
        health-check-interval: 10s
        tags:
          - version=1.0
          - environment=production
          - secure=true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties:
    consumer:
      group-id: shipment-tracking-group
      properties:
        spring.json.trusted.packages: "com.i4u.synthi_ai.*"
    listener:
      concurrency: 3

  task:
    execution:
      pool:
        core-size: 15
        max-size: 30
        queue-capacity: 200
        keep-alive: 60s
    scheduling:
      pool:
        size: 10

app:
  kafka:
    topics:
      shipment:
        created: shipment.shipment.created
        picked-up: shipment.shipment.picked.up
        in-transit: shipment.shipment.in.transit
        delivered: shipment.shipment.delivered
        exception: shipment.shipment.exception
        cancelled: shipment.shipment.cancelled
        tracking:
          updated: shipment.tracking.updated
          location: shipment.location.updated
        status:
          changed: shipment.status.changed
      delivery:
        attempted: delivery.attempt.recorded
        confirmed: delivery.delivery.confirmed
        failed: delivery.delivery.failed
      notification:
        customer: notification.customer.shipment
        driver: notification.driver.shipment
      consumer:
        order-events: marketplace.order.*
        delivery-events: delivery.*
        driver-events: driver.*
    dlq:
      suffix: ".dlq"
      retry-suffix: ".retry"
      max-retries: 3
      retry-delay: 5000

# Shipment tracking configuration
tracking:
  location:
    update-interval-seconds: 30
    accuracy-threshold-meters: 50
    retention-days: 90
  notifications:
    customer:
      pickup-confirmed: true
      in-transit: true
      delivery-attempt: true
      delivered: true
      exception: true
    driver:
      pickup-ready: true
      route-updated: true
      delivery-instructions: true
  real-time:
    websocket-enabled: true
    polling-interval-seconds: 10
    max-connections-per-user: 5

# External shipping providers
shipping:
  providers:
    fedex:
      enabled: true
      api-key: ${FEDEX_API_KEY}
      secret-key: ${FEDEX_SECRET_KEY}
      account-number: ${FEDEX_ACCOUNT_NUMBER}
      base-url: ${FEDEX_API_URL:https://apis.fedex.com}
    ups:
      enabled: true
      username: ${UPS_USERNAME}
      password: ${UPS_PASSWORD}
      access-key: ${UPS_ACCESS_KEY}
      base-url: ${UPS_API_URL:https://onlinetools.ups.com}
    dhl:
      enabled: false
      api-key: ${DHL_API_KEY}
      base-url: ${DHL_API_URL:https://api-eu.dhl.com}

  integration:
    polling-interval-minutes: 5
    batch-size: 100
    timeout-seconds: 30

# Delivery estimation
estimation:
  algorithm: "machine_learning"  # rule_based, machine_learning, hybrid
  factors:
    distance-weight: 0.3
    traffic-weight: 0.25
    weather-weight: 0.15
    driver-performance-weight: 0.2
    historical-data-weight: 0.1
  cache:
    ttl-minutes: 60
    max-entries: 10000

# WebSocket configuration for real-time tracking
websocket:
  enabled: true
  path: "/ws/tracking"
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  heartbeat-interval-seconds: 30
  max-idle-timeout-seconds: 300

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600

management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms

resilience4j:
  circuitbreaker:
    instances:
      fedexApi:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
      upsApi:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
  timelimiter:
    instances:
      fedexApi:
        timeoutDuration: 30s
      upsApi:
        timeoutDuration: 30s

logging:
  level:
    root: WARN
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    com.i4u.synthiai: INFO
    org.springframework.security: WARN
    org.mongodb.driver: WARN
    org.springframework.web.socket: INFO
  config: classpath:logback-spring.xml