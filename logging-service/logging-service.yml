server:
  port: 8085
  servlet:
    context-path: /api/logging
spring:
  application:
    name: logging-service
  elasticsearch:
    uris: https://dev-elasticsearch.synthi-ai.org:9200
    username: ${DEV_ELASTICSEARCH_USERNAME:elastic}
    password: ${DEV_ELASTICSEARCH_PASSWORD}
  kafka:
    bootstrap-servers: dev-kafka.synthi-ai.org:9092
    consumer:
      group-id: logging-service-dev
      properties:
        spring.json.trusted.packages: com.agropastoral.*
    producer: null
    topics:
      logs: agropastoral.logs.dev
      alerts: agropastoral.alerts.dev
  cloud:
    consul:
      host: dev-consul.synthi-ai.org
      port: 8500
      scheme: https
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: logging-service-dev
        instance-id: logging-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-oauth2.synthi-ai.com
          jwk-set-uri: https://dev-oauth2.synthi-ai.com/.well-known/jwks.json
          audiences:
          - dev-logging-service
logging:
  level:
    root: DEBUG
    com.agropastoral: DEBUG
    org.springframework: DEBUG
    org.elasticsearch: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: development
  health:
    elasticsearch:
      enabled: true
app:
  logging:
    retention:
      days: 7
    elasticsearch:
      indices:
        logs: agropastoral-logs-dev
        alerts: agropastoral-alerts-dev
    cache:
      query:
        max-size: 500
        ttl-minutes: 10
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
