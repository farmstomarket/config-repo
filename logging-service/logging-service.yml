server:
  port: 8085
  servlet:
    context-path: /api/logging
spring:
  application:
    name: logging-service
  elasticsearch:
    uris: https://20.116.218.195:9200
    username: ${ELASTICSEARCH_USERNAME:elastic}
    password: ${ELASTICSEARCH_PASSWORD}
  kafka:
    consumer:
      group-id: logging-service
      properties:
        spring.json.trusted.packages: com.agropastoral.*
    topics:
      logs: agropastoral.logs


      alerts: agropastoral.alerts


    bootstrap-servers: 20.116.218.195:9092
    producer: null
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: logging-service-dev
        instance-id: logging-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-logging-service
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    preferIpAddress: true
app:
  logging:
    retention:
      days: 7
    elasticsearch:
      indices:
        logs: agropastoral-logs-dev
        alerts: agropastoral-alerts-dev
    cache:
      query:
        max-size: 500
        ttl-minutes: 10
logging:
  level:
    root: DEBUG
    com.agropastoral: DEBUG
    org.springframework: DEBUG
    org.elasticsearch: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: development
  health:
    elasticsearch:
      enabled: true
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
