spring:
  application:
    name: transport-management-service
  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@20.116.218.195:27017/transport_management_dev
      auto-index-creation: true
    redis:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
      timeout: 2000
      password: ${REDIS_PASSWORD}
  kafka:
    consumer:
      group-id: transport-management-group-dev
      properties:
        spring.json.trusted.packages: com.agriconnect.*
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties:
        spring.json.type.mapping: transportEvent:com.agriconnect.transportmanagement.kafka.model.TransportEvent
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false
  cloud:
    config:
      uri: https://20.116.218.195:8888
      fail-fast: true
      retry:
        initial-interval: 1500
        multiplier: 1.5
        max-attempts: 6
        max-interval: 5000
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: transport-management-service-dev
        instance-id: transport-management-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-transport-management-service
server:
  port: 8086
  servlet:
    context-path: /api/v1
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
resilience4j:
  circuitbreaker:
    instances:
      driverManagementService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      driverManagementService:
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
        maxRetryAttempts: 3
kafka:
  topics:
    vehicle-created: transport.vehicle_created
    vehicle-updated: transport.vehicle_updated
    vehicle-status-changed: transport.vehicle_status_changed
    vehicle-location-updated: transport.vehicle_location_updated
    vehicle-maintenance-needed: transport.vehicle_maintenance_needed
    vehicle-assigned: transport.vehicle_assigned
    vehicle-available: transport.vehicle.available
    vehicle-breakdown: transport.vehicle.breakdown
  consumer:
    topics:
      driver-assigned: driver.assigned
      driver-available: driver.available
      driver-status-changed: driver.status_changed
      driver-location-updated: driver.location_updated
      vehicle-breakdown: transport.vehicle.breakdown
      logistics-vehicle-needed: logistics.vehicle_needed
      incident-vehicle-breakdown: incident.vehicle_breakdown
      delivery-completed: logistics.delivery.completed
app:
  outbox:
    relay:
      fixed-delay-ms: 5000
  dlq:
    suffix: .dlq
    retry-suffix: .retry
    max-retries: 3
    retry-delay: 5000
grpc:
  server:
    port: 9092
  client:
    driver-management-service:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 9090
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    mongodb:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.agriconnect.transportmanagement: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    org.springframework.cloud.consul: DEBUG
    org.springframework.cloud.config: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
