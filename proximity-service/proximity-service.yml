server:
  port: 9032
spring:
  application:
    name: proximity-service
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@20.116.218.195:27017/proximity_db_dev
      auto-index-creation: true
    redis:
      host: 20.116.218.195
      port: 6379
      password: ${REDIS_DEV_PASSWORD}
      timeout: 30000
      connect-timeout: 2000
  kafka:
    bootstrap-servers: 20.116.218.195:9092
    consumer:
      group-id: proximity-service-dev
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.proximityservice.domain.event
    producer: null
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false
  cloud:
    consul:
      host: 20.116.218.195
      port: 8500
      scheme: https
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: proximity-service-dev
        instance-id: proximity-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-proximity-service
axoniq:
  console:
    application-name: Proximity-Microservice-Dev
    credentials: dev-credentials
    dlq-mode: FULL
axon:
  serializer:
    general: jackson
  eventhandling:
    processors:
      business-processor:
        mode: subscribing
      user-processor:
        mode: subscribing
  mongodb:
    event-store:
      connections:
        default:
          uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@20.116.218.195:27017/proximity_events_dev
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
proximity:
  cache:
    ttl: 1800
    search-ttl: 450
    location-ttl: 150
    business-ttl: 1800
  kafka:
    topics:
      business-updates: business-updates.dev
      user-location-updates: user-location-updates.dev
      business-location-updates: business-location-updates.dev
      proximity-alerts: proximity-alerts.dev
  geospatial:
    default-precision: 7
    max-search-radius: 25000
    cache-invalidation-radius: 5000
  security:
    api-key: dev-api-key
    max-requests-per-minute: 500
  metadata:
    enabled: true
    retention-days: 30
  websocket:
    enabled: true
    max-connections-per-user: 2
    heartbeat-interval: 45000
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai.proximityservice: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    org.axonframework: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
