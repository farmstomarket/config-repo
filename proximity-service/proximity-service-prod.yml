server:
  port: 9025

spring:
  application:
    name: proximity-service

  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST}
      port: 6379
      timeout: 300000
      password: ${REDIS_PASSWORD}

  cloud:
    consul:
      host: consul.synthi-ai.org
      port: 443
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: proximity-service
        register: true
        instance-id: proximity-service
        health-check-interval: 10s
        tags:
          - version=1.0
          - environment=production
          - secure=true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties:
    consumer:
      group-id: proximity-service-group
      properties:
        spring.json.trusted.packages: "com.i4u.synthi_ai.*"
    listener:
      concurrency: 3

  task:
    execution:
      pool:
        core-size: 15
        max-size: 30
        queue-capacity: 200
        keep-alive: 60s
    scheduling:
      pool:
        size: 10

app:
  kafka:
    topics:
      proximity:
        alerts:
          triggered: proximity.alerts.triggered
          resolved: proximity.alerts.resolved
        geofence:
          entered: proximity.geofence.entered
          exited: proximity.geofence.exited
          created: proximity.geofence.created
          updated: proximity.geofence.updated
        location:
          updated: proximity.location.updated
          tracked: proximity.location.tracked
      driver:
        location: driver.location.updated
      vehicle:
        location: vehicle.location.updated
      consumer:
        transport-events: transport.*
        delivery-events: delivery.*
    dlq:
      suffix: ".dlq"
      retry-suffix: ".retry"
      max-retries: 3
      retry-delay: 5000

# Proximity and geofencing configuration
proximity:
  alerts:
    distance-threshold-meters: 100
    time-threshold-minutes: 5
    check-interval-seconds: 30
  geofencing:
    default-radius-meters: 500
    max-radius-meters: 10000
    check-interval-seconds: 15
  tracking:
    location-update-interval-seconds: 30
    accuracy-threshold-meters: 10
    retention-days: 30
  cache:
    location-ttl-seconds: 60
    geofence-ttl-seconds: 3600

# External mapping services
maps:
  google:
    api-key: ${GOOGLE_MAPS_API_KEY}
    geocoding-enabled: true
    directions-enabled: true
    places-enabled: true
  mapbox:
    access-token: ${MAPBOX_ACCESS_TOKEN}
    enabled: false

# Real-time processing
processing:
  batch-size: 1000
  processing-interval-ms: 1000
  max-concurrent-requests: 20

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600

management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms

resilience4j:
  circuitbreaker:
    instances:
      mapsService:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  timelimiter:
    instances:
      mapsService:
        timeoutDuration: 10s

logging:
  level:
    root: WARN
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    com.i4u.synthiai: INFO
    org.springframework.security: WARN
    org.mongodb.driver: WARN
  config: classpath:logback-spring.xml