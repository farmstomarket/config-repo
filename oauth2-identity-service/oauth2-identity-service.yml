server:
  port: 9000
spring:
  cache:
    type: redis
    cache-names:
    - buckets
    - jwksCache
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2000ms}
      lettuce:
        cluster:
          refresh:
            adaptive: false
        pool:
          enabled: false
          max-active: 10
          max-idle: 10
          min-idle: 2
      database: 2
  application:
    name: oauth2-identity-service
  datasource:
    url: jdbc:postgresql://20.116.218.195:${DB_PORT:5432}/farmstomarket_identity_dev
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  session:
    store-type: redis
    redis:
      flush-mode: on_save
      namespace: farmstomarket:oauth2:sessions
    timeout: 30m
  security:
    oauth2:
      authorizationserver:
        issuer: http://20.116.218.195:9020
        client:
          farmstomarket-web:
            registration:
              client-id: farmstomarket-web-client
              client-authentication-methods:
              - client_secret_basic
              authorization-grant-types:
              - authorization_code
              - refresh_token
              - client_credentials
              redirect-uris:
              - ${APP_BASE_URL}/login/oauth2/code/farmstomarket
              - ${APP_BASE_URL}/auth/callback
              scopes:
              - openid
              - profile
              - email
              - read
              - write
            require-authorization-consent: false
            require-proof-key: true
            token-settings:
              access-token-time-to-live: PT1H
              refresh-token-time-to-live: P7D
              reuse-refresh-tokens: false
          farmstomarket-mobile:
            registration:
              client-id: farmstomarket-mobile-client
              client-authentication-methods:
              - none
              authorization-grant-types:
              - authorization_code
              - refresh_token
              redirect-uris:
              - com.farmstomarket.app://oauth2/callback
              scopes:
              - openid
              - profile
              - email
              - read
              - write
            require-authorization-consent: false
            require-proof-key: true
            token-settings:
              access-token-time-to-live: PT1H
              refresh-token-time-to-live: P30D
              reuse-refresh-tokens: false
          farmstomarket-admin:
            registration:
              client-id: farmstomarket-admin-client
              client-authentication-methods:
              - client_secret_basic
              authorization-grant-types:
              - client_credentials
              scopes:
              - admin
              - read
              - write
            token-settings:
              access-token-time-to-live: PT2H
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH2_CLIENT_ID_DEV}
            client-secret: ${GOOGLE_OAUTH2_CLIENT_SECRET_DEV}
            client-name: Google
            scope:
            - openid
            - profile
            - email
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
          github:
            client-id: ${GITHUB_OAUTH2_CLIENT_ID_DEV}
            client-secret: ${OAUTH2_GITHUB_CLIENT_SECRET}
            client-name: GitHub
            scope:
            - user:email
            - read:user
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id
fusionauth:
  baseUrl: ${FUSIONAUTH_BASE_URL:https://oauth2-server.synthi-ai.com}
  issuerUri: ${FUSIONAUTH_ISSUER_URI:https://oauth2-server.synthi-ai.com}
  clientId: ${FUSIONAUTH_CLIENT_ID}
  clientSecret: ${FUSIONAUTH_CLIENT_SECRET}
  redirectUri: ${FUSIONAUTH_REDIRECT_URI:https://oauth2-server.synthi-ai.com/login/oauth2/code/fusionauth}
oauth2:
  identity:
    rate-limit:
      capacity: 5
      refill-tokens: 5
      refill-period: PT1M
      cache-ttl: PT1M
      cache-key-prefix: rate-limits-v1
  introspection:
    enabled: true
    require-client-authentication: true
  revocation:
    enabled: true
    revoke-refresh-tokens: true
    revoke-descendant-tokens: true
sentry:
  dsn: ${SENTRY_DSN:https://your-sentry-dsn@sentry.io/your-project-id}
  environment: ${SPRING_PROFILES_ACTIVE:development}
  traces-sample-rate: 1.0
jwt:
  key-store:
    location: ${JWT_KEYSTORE_LOCATION:file:/app/keys/jwt-keystore.p12}
    password: ${JWT_KEYSTORE_PASSWORD}
    alias: farmstomarket-jwt
  access-token:
    validity: 3600
    issuer: http://20.116.218.195:9020
    audience: farmstomarket-services
  refresh-token:
    validity: 604800
  id-token:
    validity: 3600
account-security:
  password-policy:
    min-length: 10
    require-uppercase: true
    require-lowercase: true
    require-numbers: true
    require-special-chars: true
    max-attempts: 20
    lockout-duration: 1m
  two-factor:
    enabled: true
    issuer: Farm's To Market
    backup-codes: 10
  session-management:
    max-concurrent-sessions: 3
    session-timeout: 30m
    remember-me-validity: P30D
rate-limiting:
  enabled: true
  oauth2:
    authorization-requests: 50/minute
    token-requests: 100/minute
    user-info-requests: 50/minute
  social-login:
    attempts: 5/minute
  password-reset:
    attempts: 3/hour
audit:
  enabled: true
  events:
  - AUTHENTICATION_SUCCESS
  - AUTHENTICATION_FAILURE
  - AUTHORIZATION_GRANTED
  - AUTHORIZATION_DENIED
  - TOKEN_ISSUED
  - TOKEN_REFRESHED
  - TOKEN_REVOKED
  - SOCIAL_LOGIN_SUCCESS
  - SOCIAL_LOGIN_FAILURE
  - PASSWORD_CHANGED
  - ACCOUNT_LOCKED
  - ACCOUNT_UNLOCKED
  storage:
    type: database
    retention: P30D
external-services:
  user-service:
    url: ${USER_SERVICE_URL:http://user-service:9002}
    timeout: 5s
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:9023}
    timeout: 10s
