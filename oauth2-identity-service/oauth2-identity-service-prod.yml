# Production overrides for oauth2-identity-service

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/farmstomarket_identity

  security:
    oauth2:
      authorizationserver:
        issuer: https://auth.farmstomarket.io
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH2_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH2_CLIENT_SECRET}
          github:
            client-id: ${GITHUB_OAUTH2_CLIENT_ID}
            client-secret: ${GITHUB_OAUTH2_CLIENT_SECRET}

jwt:
  access-token:
    validity: 1800  # 30 min in prod (stricter than default 1h)
    issuer: https://auth.farmstomarket.io

account-security:
  password-policy:
    max-attempts: 3
    lockout-duration: 30m
  session-management:
    max-concurrent-sessions: 2
    session-timeout: 15m

rate-limiting:
  oauth2:
    authorization-requests: 5/minute
    token-requests: 10/minute
  social-login:
    attempts: 3/minute
  password-reset:
    attempts: 2/hour

audit:
  storage:
    retention: P365D

management:
  tracing:
    sampling:
      probability: 0.01
