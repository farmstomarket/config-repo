server:
  port: 9040
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always
spring:
  datasource:
    url: jdbc:postgresql://20.116.218.195:${DB_PORT:5000}/delivery_scheduling_db_dev
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory
  data:
    redis:
      cluster:
        nodes:
        - ${REDIS_HOST:20.116.218.195}:${REDIS_PORT_1:7001}
        - ${REDIS_HOST:20.116.218.195}:${REDIS_PORT_2:7002}
        - ${REDIS_HOST:20.116.218.195}:${REDIS_PORT_3:7003}
      password: ${REDIS_DEV_PASSWORD}
      timeout: 30000
      connect-timeout: 2000
      lettuce:
        pool:
          max-active: 5
          max-wait: -1ms
          max-idle: 4
          min-idle: 1
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
  kafka:
    consumer:
      group-id: delivery-scheduling-group-dev
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
        enable.auto.commit: false
        fetch.min.bytes: 1
        max.poll.records: 100
    listener:
      concurrency: 2
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties:
        retry.backoff.ms: 1000
        batch.size: 16384
        linger.ms: 5
        buffer.memory: 33554432
        enable.idempotence: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
  task:
    execution:
      pool:
        core-size: 2
        max-size: 10
        queue-capacity: 50
        keep-alive: 60s
    scheduling:
      pool:
        size: 2
  application:
    name: delivery-scheduling-service
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: delivery-scheduling-service-dev
        instance-id: delivery-scheduling-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
delivery:
  scheduling:
    time-slots:
      duration-minutes: 60
      start-hour: 8
      end-hour: 18
      days-ahead: 7
    optimization:
      max-deliveries-per-slot: 5
      max-distance-km: 25
      buffer-time-minutes: 15
      priority-weights:
        urgent: 1.0
        standard: 0.7
        flexible: 0.5
    auto:
      enabled: true
      interval-minutes: 30
      batch-size: 50
app:
  kafka:
    topics:
      delivery:
        scheduled: delivery.delivery.scheduled        rescheduled: delivery.delivery.rescheduled        cancelled: delivery.delivery.cancelled        confirmed: delivery.delivery.confirmed        optimized: delivery.delivery.optimized        slot:
          created: delivery.slot.created          updated: delivery.slot.updated          full: delivery.slot.full        route:
          optimized: delivery.route.optimized          updated: delivery.route.updated      order:
        confirmed: marketplace.order.confirmed        cancelled: marketplace.order.cancelled        updated: marketplace.order.updated      consumer:
        group-id: delivery-scheduling-service-dev
        transport:
          vehicle-available: transport.vehicle.available          driver-available: transport.driver.available        harvest:
          completed: crop.harvest.completed        shipment:
          ready: shipment.ready.pickup  services:
    route-optimization:
      grpc:
        host: ${CONSUL_HOST:consul.synthi-ai.org}
        port: 9094
    transport-management:
      grpc:
        host: ${CONSUL_HOST:consul.synthi-ai.org}
        port: 9092
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
grpc:
  server:
    port: 9041
  client:
    transport-management-service:
      address: static://20.116.218.195:9092
      negotiation-type: plaintext
      max-inbound-message-size: 4MB
      max-inbound-metadata-size: 8KB
    route-optimization-service:
      address: static://20.116.218.195:9094
      negotiation-type: plaintext
      max-inbound-message-size: 4MB
      max-inbound-metadata-size: 8KB
resilience4j:
  circuitbreaker:
    instances:
      routeOptimizationService:
        registerHealthIndicator: true
        slidingWindowSize: 50
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 60
        eventConsumerBufferSize: 10
      transportService:
        registerHealthIndicator: true
        slidingWindowSize: 50
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 60
  retry:
    instances:
      routeOptimizationService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
      transportService:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,scheduledtasks
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
