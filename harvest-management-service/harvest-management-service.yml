server:
  port: 9015
spring:
  data:
    mongodb:
      auto-index-creation: true
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 300000
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2000}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json
  kafka:
    consumer:
      group-id: harvest-management-group
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    listener:
      concurrency: 3
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties: null
  task:
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 100
        keep-alive: 60s
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://farmstomarket-cluster:c9tPor0Iqm8DqUbE@cluster0.tjt6i4q.mongodb.net/harvest_db?appName=Cluster0}
  application:
    name: harvest-management-service
  cloud:
    consul:
      host: consul.synthi-ai.org
      port: 443
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: harvest-management-service
        register: true
        instance-id: harvest-management-service
        health-check-interval: 10s
        tags:
        - version=1.0
        - environment=production
        - secure=true
app:
  kafka:
    topics:
      harvest:
        planned: harvest.harvest.planned
        started: harvest.harvest.started
        completed: harvest.harvest.completed
        record:
          created: crop.harvest.record.created
          updated: crop.harvest.record.updated
        cancelled: harvest.harvest.cancelled
        quality:
          recorded: harvest.quality.recorded
          updated: harvest.quality.updated
      notification:
        events: notification.harvest.events
      harvest-events: harvest-events
      notifications: notification-events
      consumer:
        plantation:
          created: crop.plantation.created
          updated: crop.plantation.updated
          status-changed: crop.plantation.status.changed
          events: crop.plantation.events
        weather:
          events: weather.alert.triggered
        farming-status:
          events: farming.status.updated
      crop:
        ready: crop.harvest.ready
        maturity: crop.maturity.status
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
    config:
      retention-days: 7
      compression-type: snappy
      partitions: 3
      replication-factor: 1
      harvest-completed-retention-days: 30
      notification-retention-days: 3
      notification-partitions: 2
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
  services:
    crop-management:
      url: ${CROP_MANAGEMENT_SERVICE_URL:http://crop-management-service:8080}
    farming-status:
      url: ${FARMING_STATUS_SERVICE_URL:http://farming-status-service:8080}
    weather:
      url: ${WEATHER_SERVICE_URL:http://weather-service:8080}
  minio:
    url: ${MINIO_URL:http://20.116.218.195:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:harvest-management}
    presigned-url-expiry: ${MINIO_PRESIGNED_URL_EXPIRY:3600}
  file-upload:
    max-file-size: ${FILE_UPLOAD_MAX_SIZE:10485760}
    max-request-size: ${FILE_UPLOAD_MAX_REQUEST:52428800}
    allowed-extensions: ${FILE_UPLOAD_ALLOWED_EXT:jpg,jpeg,png,gif,webp,pdf,doc,docx}
    virus-scan-enabled: ${FILE_UPLOAD_VIRUS_SCAN:true}
    encryption-enabled: ${FILE_UPLOAD_ENCRYPTION:true}
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 5s
minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME:harvest}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600
management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
logging:
  level:
    root: WARN
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    com.i4u.synthiai: INFO
    org.springframework.security: WARN
    org.mongodb.driver: WARN
  config: classpath:logback-spring.xml
