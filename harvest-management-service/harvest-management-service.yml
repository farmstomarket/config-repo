server:
  port: 9017
spring:
  data:
    mongodb:
      auto-index-creation: true
      uri: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@20.116.218.195:27017/harvest_management_db_dev
    redis:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 30000
      connect-timeout: 2000
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        service-id: harvest-management-service-dev
        register: true
        instance-id: harvest-management-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-harvest-management-service
  kafka:
    consumer:
      group-id: harvest-management-group-dev
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
        max.poll.records: 100
    listener:
      concurrency: 2
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties: null
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 25
        keep-alive: 60s
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://farmstomarket-cluster:c9tPor0Iqm8DqUbE@cluster0.tjt6i4q.mongodb.net/harvest_db?appName=Cluster0}
  application:
    name: harvest-management-service
  cloud:
    vault:
      enabled: false
app:
  kafka:
    topics:
      harvest:
        planned: crop.harvest.planned


        started: crop.harvest.started


        completed: crop.harvest.completed


        record:
          created: crop.harvest.record.created


          updated: crop.harvest.record.updated


      notification:
        events: notification.harvest.events


      harvest-events: harvest-events
      notifications: notification-events
      consumer:
        plantation:
          created: crop.plantation.created



          updated: crop.plantation.updated



          status-changed: crop.plantation.status.changed



          events: crop.plantation.status.changed


        weather:
          events: weather.alert.triggered


        farming-status:
          events: farming.status.updated



    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
    config:
      retention-days: 7
      compression-type: snappy
      partitions: 3
      replication-factor: 1
      harvest-completed-retention-days: 30
      notification-retention-days: 3
      notification-partitions: 2
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
  services:
    crop-management:
      url: ${CROP_MANAGEMENT_SERVICE_URL:http://crop-management-service:8080}
    farming-status:
      url: ${FARMING_STATUS_SERVICE_URL:http://farming-status-service:8080}
    weather:
      url: ${WEATHER_SERVICE_URL:http://weather-service:8080}
  minio:
    url: ${MINIO_URL:http://20.116.218.195:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:harvest-management}
    presigned-url-expiry: ${MINIO_PRESIGNED_URL_EXPIRY:3600}
  file-upload:
    max-file-size: ${FILE_UPLOAD_MAX_SIZE:10485760}
    max-request-size: ${FILE_UPLOAD_MAX_REQUEST:52428800}
    allowed-extensions: ${FILE_UPLOAD_ALLOWED_EXT:jpg,jpeg,png,gif,webp,pdf,doc,docx}
    virus-scan-enabled: ${FILE_UPLOAD_VIRUS_SCAN:true}
    encryption-enabled: ${FILE_UPLOAD_ENCRYPTION:true}
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        slidingWindowSize: 50
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 5s
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      access: read_only
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    org.springframework.cloud: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: DEBUG
    com.i4u.synthi_ai: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
