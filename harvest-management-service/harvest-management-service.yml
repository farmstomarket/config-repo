server:
  port: 9017
spring:
  application:
    name: harvest-management-service
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@dev-mongo.synthi-ai.org:27017/harvest_management_db_dev
      auto-index-creation: true
    redis:
      host: dev-redis.synthi-ai.org
      port: 6379
      password: ${REDIS_DEV_PASSWORD}
      timeout: 30000
      connect-timeout: 2000
    consul:
      host: dev-consul.synthi-ai.org
      port: 8500
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: harvest-management-service-dev
        register: true
        instance-id: harvest-management-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  cloud:
    vault:
      enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-oauth2.synthi-ai.com
          jwk-set-uri: https://dev-oauth2.synthi-ai.com/.well-known/jwks.json
          audiences:
          - dev-harvest-management-service
  kafka:
    bootstrap-servers: dev-kafka.synthi-ai.org:9092
    producer:
      properties: null
    consumer:
      group-id: harvest-management-group-dev
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
        max.poll.records: 100
    listener:
      concurrency: 2
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 25
        keep-alive: 60s
app:
  kafka:
    topics:
      harvest:
        planned: crop.harvest.planned.dev
        started: crop.harvest.started.dev
        completed: crop.harvest.completed.dev
        record:
          created: crop.harvest.record.created.dev
          updated: crop.harvest.record.updated.dev
      notification:
        events: notification.harvest.events.dev
      consumer:
        plantation:
          events: crop.plantation.status.changed.dev
        weather:
          events: weather.alert.triggered.dev
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      access: read_only
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        slidingWindowSize: 50
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 5s
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    org.springframework.cloud: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: DEBUG
    com.i4u.synthi_ai: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
