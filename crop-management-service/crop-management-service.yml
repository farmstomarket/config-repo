server:
  port: 9011
spring:
  data:
    redis:
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:20.116.218.195:6379}
      password: ${REDIS_PASSWORD}
      timeout: 60000
      connect-timeout: 2000
      repositories:
        enabled: false
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
    mongodb:
      uri: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@20.116.218.195:27017/crop_management_db_dev
      auto-index-creation: true
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://farmstomarket-cluster:c9tPor0Iqm8DqUbE@cluster0.tjt6i4q.mongodb.net/crop_management_db?appName=Cluster0}
    auto-index-creation: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
  kafka:
    consumer:
      group-id: crop-management-group
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    listener:
      concurrency: 1
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties: null
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 25
        keep-alive: 60s
  application:
    name: crop-management-service
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: crop-management-service-dev
        instance-id: crop-management-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
app:
  kafka:
    topics:
      crop:
        farm:
          created: crop.farm.created


          updated: crop.farm.updated


          status-changed: crop.farm.status.changed


        plantation:
          created: crop.plantation.created


          updated: crop.plantation.updated


          status-changed: crop.plantation.status.changed


      imagery:
        request: imagery.satellite.request


        response: imagery.satellite.response


      consumer:
        proximity:
          alerts: proximity.alerts.triggered


        satellite:
          images: satellite.images.processed


      verification:
        results: crop-management.verification.completed



        failed: crop-management.verification.failed



    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        slidingWindowSize: 50
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 5s
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 10s
minio:
  url: https://20.116.218.195:9000
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: crops-dev
cache:
  ttl:
    farm: 3600
    crop: 86400
    plantation: 3600
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    org.springframework.cloud: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: DEBUG
    com.i4u.synthiai: DEBUG
