        queue-capacity: 25
        keep-alive: 60s
  application:
    name: crop-management-service
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: crop-management-service-dev
        instance-id: crop-management-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
app:
  kafka:
    topics:
      crop:
        farm:
          created: crop.farm.created


          updated: crop.farm.updated


          status-changed: crop.farm.status.changed


        plantation:
          created: crop.plantation.created


          updated: crop.plantation.updated


          status-changed: crop.plantation.status.changed


      imagery:
        request: imagery.plantation.requested


        response: imagery.plantation.processed


      consumer:
        proximity:
          alerts: proximity.alerts.triggered


        satellite:
          images: satellite.images.processed


      verification:
        results: crop-management.verification.completed



        failed: crop-management.verification.failed



    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        slidingWindowSize: 50
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 5s
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 10s
minio:
  url: https://20.116.218.195:9000
  access-key: '{cipher}95aa0003db030c830e1297e96e23887212fd597b26a2b3f91380fe181f7b14c9'
  secret-key: '{cipher}d34c479277737049ef856313c07b3ceb7e8f8fd34b0f20ad7e88c0c9d48aaf60'
  bucket-name: crops-dev
cache:
  ttl:
    farm: 3600
    crop: 86400
    plantation: 3600
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    org.springframework.cloud: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: DEBUG
    com.i4u.synthiai: DEBUG
