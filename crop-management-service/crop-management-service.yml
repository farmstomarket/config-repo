server:
  port: 9011
spring:
  data:
    redis:
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:20.116.218.195:6379}
      password: ${REDIS_PASSWORD}
      timeout: 300000
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2000}
      repositories:
        enabled: false
      host: ${REDIS_HOST}
      port: 6379
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://farmstomarket-cluster:c9tPor0Iqm8DqUbE@cluster0.tjt6i4q.mongodb.net/crop_management_db?appName=Cluster0}
    auto-index-creation: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json
          issuer-uri: ${OAUTH2_ISSUER:https://oauth2-server.synthi-ai.com}
  kafka:
    consumer:
      group-id: crop-management-group
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    listener:
      concurrency: 3
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties: null
  task:
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 100
        keep-alive: 60s
  application:
    name: crop-management-service
  cloud:
    consul:
      host: consul.synthi-ai.org
      port: 443
      scheme: https
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: crop-management-service
        instance-id: crop-management-service
        health-check-interval: 10s
        tags:
        - version=1.0
        - environment=production
        - secure=true
app:
  kafka:
    topics:
      crop:
        farm:
          created: crop.farm.created
          updated: crop.farm.updated
          status-changed: crop.farm.status.changed
        plantation:
          created: crop.plantation.created
          updated: crop.plantation.updated
          status-changed: crop.plantation.status.changed
      imagery:
        request: imagery.satellite.request
        response: imagery.satellite.response
      consumer:
        proximity:
          alerts: proximity.alerts.triggered
        satellite:
          images: satellite.images.processed
      verification:
        results: crop-management.verification.completed
        failed: crop-management.verification.failed
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 5s
minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME:crops}
cache:
  ttl:
    farm: 3600
    crop: 86400
    plantation: 3600
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600
management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
logging:
  level:
    root: WARN
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    com.i4u.synthiai: INFO
    org.springframework.security: WARN
    org.mongodb.driver: WARN
  config: classpath:logback-spring.xml
