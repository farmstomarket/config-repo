spring:
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: 'false'
        acks: all
        retries: 3
        batch-size: 16384
        buffer-memory: 33554432
        compression.type: lz4
        delivery.timeout.ms: 120000
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
        isolation.level: read_committed
        max.poll.interval.ms: 300000
        max.poll.records: 500
        session.timeout.ms: 30000
        heartbeat.interval.ms: 3000
    listener:
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
      concurrency: 1
    bootstrap-servers: 20.116.218.195:9092
  cloud:
    consul:
      config:
        enabled: true
        format: YAML
        retry:
          max-attempts: 6
          max-interval: 2000
          multiplier: 1.5
      discovery:
        health-check-path: /actuator/health
        health-check-interval: 30s
        prefer-ip-address: true
        deregister: true
        tags:
        - environment=dev
      host: 20.116.218.195
      port: 8500
      scheme: https
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
      ddl-auto: validate
    show-sql: true
  data:
    redis:
      host: 20.116.218.195
      port: 6379
      password: ${REDIS_DEV_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: dev
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms,100ms,200ms,500ms,2000ms
  tracing:
    sampling:
      probability: 1.0
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 100
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 10
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        event-consumer-buffer-size: 10
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
        - java.io.IOException
        - java.net.ConnectException
        - java.net.SocketTimeoutException
logging:
  pattern:
    console: '%d{yyyy-MM-dd''T''HH:mm:ss.SSS''Z''} %-5level [${spring.application.name:app},%X{traceId:-},%X{spanId:-}] %logger{36}
      - %msg%n'
  level:
    root: INFO
    com.i4u.synthi_ai: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO
    org.springframework.cloud: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
