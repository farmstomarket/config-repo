server:
  port: 9004
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5000}/certification_db_dev
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
    redis:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
      timeout: 300000
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - ${FUSIONAUTH_CLIENT_ID}
      client:
        registration:
          fusionauth:
            client-id: ${FUSIONAUTH_CLIENT_ID}
            client-secret: ${FUSIONAUTH_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope:
            - openid
            - email
            - profile
        provider:
          fusionauth:
            issuer-uri: http://20.116.218.195:9020
            authorization-uri: http://20.116.218.195:9020/oauth2/authorize
            token-uri: http://20.116.218.195:9020/oauth2/token
            user-info-uri: http://20.116.218.195:9020/oauth2/userinfo
            jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
  kafka:
    consumer:
      group-id: certification-service-group
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    listener:
      concurrency: 1
      ack-mode: MANUAL_IMMEDIATE
      missing-topics-fatal: false
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties: null
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 25
        keep-alive: 60s
  application:
    name: certification-service
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 300000
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: certification-service-dev
        instance-id: certification-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        slidingWindowSize: 50
        permittedNumberOfCallsInHalfOpenState: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 5s
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 10s
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    org.springframework.cloud: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: DEBUG
    com.i4u.synthi_ai: DEBUG
