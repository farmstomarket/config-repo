server:
  port: 9014
  error:
    include-message: always
    include-binding-errors: always
spring:
  data:
    mongodb:
      auto-index-creation: true
      uri: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@20.116.218.195:27017/farming_status_db_dev
    redis:
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:20.116.218.195:7001,20.116.218.195:7002,20.116.218.195:7003}
      password: ${REDIS_PASSWORD}
      timeout: 30000
      connect-timeout: 2000
      repositories:
        enabled: false
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
  kafka:
    consumer:
      group-id: farming-status-service
      properties:
        spring.json.trusted.packages: com.i4u.synthiai.*
    listener:
      ack-mode: manual
    bootstrap-servers: 20.116.218.195:9092
    producer: null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-farming-status-service
  web:
    error:
      include-binding-errors: always
      include-message: always
  mongodb:
    uri: ${MONGODB_URI:mongodb+srv://farmstomarket-cluster:c9tPor0Iqm8DqUbE@cluster0.tjt6i4q.mongodb.net/farming_status_db?appName=Cluster0}
  application:
    name: farming-status-service
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        service-id: farming-status-service-dev
        register: true
        instance-id: farming-status-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
agrotech:
  kafka:
    topics:
      status-created: farming-status-created.dev
      status-updated: farming-status-updated.dev
      status-critical: farming-status-critical.dev
      event-created: farming-event-created.dev
      event-resolved: farming-event-resolved.dev
      alert-triggered: farming-alert-triggered.dev
      alert-acknowledged: farming-alert-acknowledged.dev
      alert-resolved: farming-alert-resolved.dev
      prediction-generated: farming-prediction-generated.dev
      crop-health-changed: crop-health-changed
      growth-stage-updated: growth-stage-updated
      farming-recommendation: farming-recommendation
    consumer-topics:
      plantation-created: plantation-created.dev
      plantation-updated: plantation-updated.dev
      plantation-status-changed: crop.plantation.status.changed



      harvest-completed: crop.harvest.completed



      harvest-started: crop.harvest.started



      growth-stage-updated: growth-stage-updated
      weather-alert: weather-alert.dev
      sensor-reading: sensor-reading.dev
  cache:
    time-to-live: 3600
    redis:
      default-ttl: 3600
      alert-ttl: 300
      status-ttl: 1800
      event-ttl: 900
      prediction-ttl: 7200
  security:
    allowed-origins: http://localhost:3000,http://localhost:4200,http://localhost:8080,https://dev-app.farmstomarket.io
    jwt:
      cache-duration: 300
  monitoring:
    metrics:
      enabled: true
      detailed: true
    health:
      checks:
        redis: true
        kafka: true
        database: true
  business:
    alerts:
      max-active-per-plantation: 25
      auto-resolve-after-days: 30
    events:
      max-history-days: 365
      cleanup-batch-size: 500
    predictions:
      cache-duration-hours: 24
      max-predictions-per-plantation: 10
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    mongodb:
      enabled: true
    redis:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
mongock:
  migration-scan-package: com.i4u.synthiai.*
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.i4u.synthiai: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    org.springframework.cloud.consul: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
