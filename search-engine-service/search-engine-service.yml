server:
  port: 9017
spring:
  application:
    name: search-engine-service
  profiles:
    active: dev
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@dev-mongo.synthi-ai.org:27017/farmstomarket_db_dev
      database: farmstomarket_db_dev
      auto-index-creation: true
    redis:
      host: dev-redis.synthi-ai.org
      port: 6379
      password: ${REDIS_DEV_PASSWORD}
      timeout: 30000
      connect-timeout: 2000
  kafka:
    bootstrap-servers: dev-kafka.synthi-ai.org:9092
    consumer:
      group-id: search-engine-service-dev
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai
        spring.json.type.mapping: genericEntityEvent:com.i4u.synthi_ai.searchengineservice.applications.events.GenericEntityEvent
    producer: null
    listener:
      ack-mode: manual_immediate
  cloud:
    consul:
      host: dev-consul.synthi-ai.org
      port: 8500
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: search-engine-service-dev
        register: true
        instance-id: search-engine-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-oauth2.synthi-ai.com
          jwk-set-uri: https://dev-oauth2.synthi-ai.com/.well-known/jwks.json
          audiences:
          - dev-search-engine-service
app:
  search:
    meilisearch:
      url: https://dev-meilisearch.synthi-ai.org:7700
      apiKey: ${DEV_MEILISEARCH_API_KEY:dev-meilisearch-master-key}
    milvus:
      enabled: true
      host: dev-milvus.synthi-ai.org
      port: 19530
      username: ${DEV_MILVUS_USERNAME:dev-user}
      password: ${DEV_MILVUS_PASSWORD:dev-password}
    hybrid:
      text-weight: 0.7
      vector-weight: 0.3
      top-k: 50
      vector-dimension: 384
    discovery:
      excluded-collections:
      - system.indexes
      - system.users
      - fs.files
      - fs.chunks
      auto-refresh: true
      refresh-interval: 600000
    indexing:
      batch-size: 500
      parallel-threads: 2
      auto-create-indices: true
    sync:
      auto-start: true
      retry-delay: 5000
      enable-global-watch: true
    initialization:
      auto-create: true
  cache:
    ttl: 180
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    mongodb:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai.searchengineservice: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
