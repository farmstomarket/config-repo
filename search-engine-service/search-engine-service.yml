app:
  search:
    meilisearch:
      url: https://20.116.218.195:7700
      apiKey: ${MEILISEARCH_API_KEY}
    milvus:
      enabled: true
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 19530
      username: ${MILVUS_USERNAME}
      password: '{cipher}96d7ffb45b4b9c33ce6bce62bf97ed5b50ce24ed64f7ea7290ffc27cf039fcd709400ce946b04c8d1a7e2381c75986bb'
    hybrid:
      text-weight: 0.7
      vector-weight: 0.3
      top-k: 50
      vector-dimension: 384
    discovery:
      excluded-collections:
      - system.indexes
      - system.users
      - fs.files
      - fs.chunks
      auto-refresh: true
      refresh-interval: 600000
    indexing:
      batch-size: 500
      parallel-threads: 2
      auto-create-indices: true
    sync:
      auto-start: true
      retry-delay: 5000
      enable-global-watch: true
    initialization:
      auto-create: true
  cache:
    ttl: 180
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    mongodb:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai.searchengineservice: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
