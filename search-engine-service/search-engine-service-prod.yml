server:
  port: 9028

spring:
  application:
    name: search-engine-service

  data:
    elasticsearch:
      rest:
        uris: ${ELASTICSEARCH_URI}
        username: ${ELASTICSEARCH_USERNAME:elastic}
        password: ${ELASTICSEARCH_PASSWORD}
        connection-timeout: 30s
        read-timeout: 30s
    redis:
      host: ${REDIS_HOST}
      port: 6379
      timeout: 300000
      password: ${REDIS_PASSWORD}

  cloud:
    consul:
      host: consul.synthi-ai.org
      port: 443
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: search-engine-service
        register: true
        instance-id: search-engine-service
        health-check-interval: 10s
        tags:
          - version=1.0
          - environment=production
          - secure=true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties:
    consumer:
      group-id: search-engine-group
      properties:
        spring.json.trusted.packages: "com.i4u.synthi_ai.*"
    listener:
      concurrency: 5

  task:
    execution:
      pool:
        core-size: 15
        max-size: 30
        queue-capacity: 200
        keep-alive: 60s

app:
  kafka:
    topics:
      search:
        index:
          product: search.index.product
          user: search.index.user
          farm: search.index.farm
          order: search.index.order
        query:
          executed: search.query.executed
          suggested: search.query.suggested
      consumer:
        marketplace: marketplace.*
        user: user.*
        farm: crop.*
    dlq:
      suffix: ".dlq"
      retry-suffix: ".retry"
      max-retries: 3
      retry-delay: 5000

# Elasticsearch configuration
elasticsearch:
  indices:
    products:
      name: products
      shards: 3
      replicas: 1
      refresh-interval: 5s
      mappings:
        dynamic: false
    users:
      name: users
      shards: 2
      replicas: 1
      refresh-interval: 30s
    farms:
      name: farms
      shards: 2
      replicas: 1
      refresh-interval: 30s
    orders:
      name: orders
      shards: 3
      replicas: 1
      refresh-interval: 10s
    search-analytics:
      name: search-analytics
      shards: 1
      replicas: 1
      refresh-interval: 60s

# Search configuration
search:
  query:
    default-size: 20
    max-size: 100
    highlight:
      enabled: true
      fragment-size: 150
      number-of-fragments: 3
    fuzzy:
      enabled: true
      fuzziness: "AUTO"
      prefix-length: 2
      max-expansions: 50
    aggregations:
      max-buckets: 100
      min-doc-count: 1

  autocomplete:
    enabled: true
    min-chars: 2
    max-suggestions: 10
    cache-ttl-minutes: 60

  analytics:
    enabled: true
    track-queries: true
    track-clicks: true
    track-conversions: true
    batch-size: 100
    flush-interval-seconds: 30

  filters:
    price:
      enabled: true
      ranges:
        - "0-10"
        - "10-25"
        - "25-50"
        - "50-100"
        - "100-*"
    location:
      enabled: true
      radius-km: [1, 5, 10, 25, 50]
    category:
      enabled: true
      facet-limit: 50
    rating:
      enabled: true
      min-rating: 1
      max-rating: 5

  indexing:
    batch-size: 1000
    refresh-after-write: false
    bulk-timeout-seconds: 30
    retry-attempts: 3

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600

management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1000ms

resilience4j:
  circuitbreaker:
    instances:
      elasticsearch:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  timelimiter:
    instances:
      elasticsearch:
        timeoutDuration: 30s

logging:
  level:
    root: WARN
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    com.i4u.synthiai: INFO
    org.springframework.security: WARN
    org.elasticsearch: INFO
  config: classpath:logback-spring.xml