server:
  port: 9012
spring:
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://farmstomarket-cluster:c9tPor0Iqm8DqUbE@cluster0.tjt6i4q.mongodb.net/imagery_satellite_db?appName=Cluster0}
    auto-index-creation: true
  kafka:
    consumer:
      group-id: imagery-satellite-group
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    topics:
      imagery-request:
        name: ${KAFKA_TOPIC_IMAGERY_REQUEST:imagery.plantation.requested}
        partitions: ${KAFKA_TOPIC_IMAGERY_REQUEST_PARTITIONS:3}
        replication-factor: ${KAFKA_TOPIC_IMAGERY_REQUEST_REPLICATION:1}
      imagery-response:
        name: ${KAFKA_TOPIC_IMAGERY_RESPONSE:imagery.plantation.processed}
        partitions: ${KAFKA_TOPIC_IMAGERY_RESPONSE_PARTITIONS:3}
        replication-factor: ${KAFKA_TOPIC_IMAGERY_RESPONSE_REPLICATION:1}
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties: null
  application:
    name: imagery-satellite-service
  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@20.116.218.195:27017/imagery_satellite_db_dev
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: imagery-satellite-service-dev
        instance-id: imagery-satellite-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-imagery-satellite-service
app:
  kafka:
    consumer-topics:
      plantation-created: crop.plantation.created



      harvest-completed: crop.harvest.completed



      imagery-requested: imagery.plantation.requested



minio:
  url: https://20.116.218.195:9000
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: satellite-images-dev
satellite:
  providers:
    mapbox:
      api-key: dev-mapbox-api-key
      enabled: true
    yandex:
      api-key: dev-yandex-api-key
      enabled: true
  image:
    max-width: 1024
    max-height: 1024
    quality: 0.8
    format: jpeg
    max-zoom-level: 16
    retry-attempts: 3
    timeout-seconds: 30
    tile-size: 512
    max-tiles-per-request: 4
management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    io.minio: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
