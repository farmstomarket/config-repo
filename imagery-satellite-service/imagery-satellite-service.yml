server:
  port: 9012
spring:
  application:
    name: imagery-satellite-service
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@dev-mongo.synthi-ai.org:27017/imagery_satellite_db_dev
  cloud:
    consul:
      host: dev-consul.synthi-ai.org
      port: 8500
      scheme: https
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: imagery-satellite-service-dev
        instance-id: imagery-satellite-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  kafka:
    bootstrap-servers: dev-kafka.synthi-ai.org:9092
    producer:
      properties: null
    consumer:
      group-id: imagery-satellite-group-dev
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-oauth2.synthi-ai.com
          jwk-set-uri: https://dev-oauth2.synthi-ai.com/.well-known/jwks.json
          audiences:
          - dev-imagery-satellite-service
minio:
  url: https://dev-minio.synthi-ai.org:9000
  access-key: ${DEV_MINIO_ACCESS_KEY:dev-access-key}
  secret-key: ${DEV_MINIO_SECRET_KEY:dev-secret-key}
  bucket-name: satellite-images-dev
management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
satellite:
  providers:
    mapbox:
      api-key: dev-mapbox-api-key
      enabled: true
    yandex:
      api-key: dev-yandex-api-key
      enabled: true
  image:
    max-width: 1024
    max-height: 1024
    quality: 0.8
    format: jpeg
    max-zoom-level: 16
    retry-attempts: 3
    timeout-seconds: 30
    tile-size: 512
    max-tiles-per-request: 4
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.i4u.synthi_ai: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    io.minio: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
