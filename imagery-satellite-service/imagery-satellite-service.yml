server:
  port: 9016
spring:
  mongodb:
    uri: ${SPRING_DATA_MONGODB_URI:mongodb+srv://farmstomarket-cluster:c9tPor0Iqm8DqUbE@cluster0.tjt6i4q.mongodb.net/imagery_satellite_db?appName=Cluster0}
    auto-index-creation: true
  kafka:
    consumer:
      group-id: imagery-satellite-group
      properties:
        spring.json.trusted.packages: com.i4u.synthi_ai.*
    topics:
      imagery-request:
        name: ${KAFKA_TOPIC_IMAGERY_REQUEST:imagery.plantation.requested}
        partitions: ${KAFKA_TOPIC_IMAGERY_REQUEST_PARTITIONS:3}
        replication-factor: ${KAFKA_TOPIC_IMAGERY_REQUEST_REPLICATION:1}
      imagery-response:
        name: ${KAFKA_TOPIC_IMAGERY_RESPONSE:imagery.plantation.processed}
        partitions: ${KAFKA_TOPIC_IMAGERY_RESPONSE_PARTITIONS:3}
        replication-factor: ${KAFKA_TOPIC_IMAGERY_RESPONSE_REPLICATION:1}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      properties: null
    listener:
      concurrency: 3
  application:
    name: imagery-satellite-service
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST}
      port: 6379
      timeout: 300000
      password: ${REDIS_PASSWORD}
  cloud:
    consul:
      host: consul.synthi-ai.org
      port: 443
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: imagery-satellite-service
        register: true
        instance-id: imagery-satellite-service
        health-check-interval: 10s
        tags:
        - version=1.0
        - environment=production
        - secure=true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER:https://oauth2-server.synthi-ai.com}
          jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json
  task:
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 100
        keep-alive: 60s
app:
  kafka:
    consumer-topics:
      plantation-created: crop.plantation.created
      harvest-completed: crop.harvest.completed
      imagery-requested: imagery.plantation.requested
    topics:
      imagery:
        request: imagery.plantation.requested
        response: imagery.plantation.processed
        processed: imagery.plantation.processed
        analysis:
          completed: imagery.analysis.completed
          failed: imagery.analysis.failed
      ndvi:
        calculated: ndvi.index.calculated
        alert: ndvi.alert.triggered
    dlq:
      suffix: .dlq
      retry-suffix: .retry
      max-retries: 3
      retry-delay: 5000
minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME:satellite-images}
satellite:
  providers:
    mapbox:
      api-key: ${MAPBOX_API_KEY:}
      enabled: ${MAPBOX_ENABLED:true}
    yandex:
      api-key: ${YANDEX_API_KEY:}
      enabled: ${YANDEX_ENABLED:true}
  image:
    max-width: ${SATELLITE_IMAGE_MAX_WIDTH:2048}
    max-height: ${SATELLITE_IMAGE_MAX_HEIGHT:2048}
    quality: ${SATELLITE_IMAGE_QUALITY:0.85}
    format: ${SATELLITE_IMAGE_FORMAT:jpeg}
    max-zoom-level: ${SATELLITE_IMAGE_MAX_ZOOM:18}
    retry-attempts: ${SATELLITE_IMAGE_RETRY_ATTEMPTS:3}
    timeout-seconds: ${SATELLITE_IMAGE_TIMEOUT:30}
    tile-size: ${SATELLITE_IMAGE_TILE_SIZE:1024}
    max-tiles-per-request: ${SATELLITE_IMAGE_MAX_TILES:9}
  api:
    sentinal:
      base-url: ${SENTINAL_API_URL:https://scihub.copernicus.eu/dhus}
      username: ${SENTINAL_USERNAME}
      password: ${SENTINAL_PASSWORD}
    planet:
      base-url: ${PLANET_API_URL:https://api.planet.com}
      api-key: ${PLANET_API_KEY}
  processing:
    max-concurrent-requests: 5
    timeout-seconds: 300
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://farmstomarket.io,https://www.farmstomarket.io,https://app.farmstomarket.io}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:*}
  allow-credentials: true
  max-age: 3600
management:
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0.1
  metrics:
    tags:
      application: ${spring.application.name}
      environment: production
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 2000ms
resilience4j:
  circuitbreaker:
    instances:
      satelliteApi:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  timelimiter:
    instances:
      satelliteApi:
        timeoutDuration: 300s
logging:
  level:
    root: WARN
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    com.i4u.synthiai: INFO
    org.springframework.security: WARN
    org.mongodb.driver: WARN
  config: classpath:logback-spring.xml
