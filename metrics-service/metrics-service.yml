server:
  port: 8086
  servlet:
    context-path: /api/metrics
spring:
  application:
    name: metrics-service
  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME}:'{cipher}4cc641f48e671b7ae7e2217f34a3e5fa273cadf38d1f0d80afc7c2dcd94b6526dff358ad927c1f5195f787bbedd603fc'@20.116.218.195:27017/metrics_dev
      auto-index-creation: true
  cache:
    cache-names: metrics,dashboards,alerts
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m
  cloud:
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: metrics-service-dev
        instance-id: metrics-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-metrics-service
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    preferIpAddress: true
prometheus:
  scrape:
    endpoint: https://20.116.218.195:9090/api/v1
  alertmanager:
    endpoint: https://20.116.218.195:9093/api/v2
  retention:
    days: 7
  targets:
  - name: marketplace-service
    job: marketplace-service
    instance: localhost:9030
    interval: 30s
    path: /actuator/prometheus
  - name: logging-service
    job: logging-service
    instance: localhost:8085
    interval: 30s
    path: /actuator/prometheus
grafana:
  endpoint: https://20.116.218.195:3000/api
  apiKey: ${GRAFANA_API_KEY}
app:
  metrics:
    collection:
      interval: 30s
    dashboard:
      auto-refresh: 60s
    default-retention: 30d
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    mongodb:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.agropastoral: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
