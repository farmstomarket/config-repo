server:
  port: 8086
  servlet:
    context-path: /api/metrics
spring:
  application:
    name: metrics-service
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@dev-mongo.synthi-ai.org:27017/metrics_dev
      auto-index-creation: true
  cache:
    cache-names: metrics,dashboards,alerts
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m
  cloud:
    consul:
      host: dev-consul.synthi-ai.org
      port: 8500
      scheme: https
      enabled: true
      discovery:
        enabled: true
        register: true
        service-id: metrics-service-dev
        instance-id: metrics-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-oauth2.synthi-ai.com
          jwk-set-uri: https://dev-oauth2.synthi-ai.com/.well-known/jwks.json
          audiences:
          - dev-metrics-service
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    mongodb:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
prometheus:
  scrape:
    endpoint: https://dev-prometheus.synthi-ai.org:9090/api/v1
  alertmanager:
    endpoint: https://dev-alertmanager.synthi-ai.org:9093/api/v2
  retention:
    days: 7
  targets:
  - name: marketplace-service
    job: marketplace-service
    instance: localhost:9030
    interval: 30s
    path: /actuator/prometheus
  - name: logging-service
    job: logging-service
    instance: localhost:8085
    interval: 30s
    path: /actuator/prometheus
grafana:
  endpoint: https://dev-grafana.synthi-ai.org:3000/api
  apiKey: ${DEV_GRAFANA_API_KEY:dev-grafana-key}
app:
  metrics:
    collection:
      interval: 30s
    dashboard:
      auto-refresh: 60s
    default-retention: 30d
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.agropastoral: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
