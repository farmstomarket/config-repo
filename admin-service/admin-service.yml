server:
  port: 9001
spring:
  cache:
    type: redis
    cache-names:
    - buckets
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      timeout: 300000
      repositories:
        enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: '{cipher}1c29575a13baee7204cc00eff48c267cef97adf2d82cdcfbbaa6bf37531b31d1d1cd334683649bfc0ee1bb4622dcbcb6'
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://oauth2-server.synthi-ai.com
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://oauth2-server.synthi-ai.com/.well-known/jwks.json}
          audiences:
          - ${FUSIONAUTH_APP_ID}
      client:
        registration:
          fusionauth:
            client-id: ${FUSIONAUTH_CLIENT_ID}
            client-secret: '{cipher}034e91dcac1228ecd544feabdaa72b9d7805e0068e4bedfbd4d7dc273961364d9d90d39abd67f39ae93ad55c63a6ef748f9a6eca8f3e3af619844bc21489c3ef'
            authorization-grant-type: authorization_code
            scope:
            - openid
            - email
            - profile
            - phone
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
        provider:
          fusionauth:
            issuer-uri:
            - ${FUSIONAUTH_ISSUER_URI:https://oauth2-server.synthi-ai.com}
            authorization-uri: https://oauth2-server.synthi-ai.com/oauth2/authorize
            token-uri: https://oauth2-server.synthi-ai.com/oauth2/token
            user-info-uri: https://oauth2-server.synthi-ai.com/oauth2/userinfo
            jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json
            user-name-attribute: phone
fusionauth:
  apiKey: '{cipher}91de5cc8f33e1cbcd7a6bb0e3bb92ec0564c33bde70dd4dd7e35252e4879e9807d60bb258d6365e1de1ec34d3783d2fc14acae89739c81279cfa66c69fa265e186bb8f33a117201913733a8edff537cc'
  applicationId: ${FUSIONAUTH_APP_ID}
  baseUrl: https://oauth2-server.synthi-ai.com
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: '{cipher}8d299b8814cd859543d034faf6553f0db7ee7c5d85c26c2bd9de7c7d25a78bd9a284468a127859fe664096f444e5025466d6719dddc88d6a9e8d707adc48aca8'
  phone-number: ${TWILIO_PHONE_NUMBER}
  verification:
    service-sid: ${TWILIO_VERIFICATION_SERVICE_SID}
bucket4j:
  enabled: true
  filters:
  - cache-name: buckets
    url: /api/v1/auth.*
    rate-limits:
    - bandwidth:
        capacity: 5
        time: 1
        unit: minutes
      cache-key: getHost()
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization}
  allow-credentials: true
  max-age: 3600
