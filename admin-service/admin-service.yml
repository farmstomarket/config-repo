server:
  port: 9001
spring:
  cache:
    type: redis
    cache-names:
    - buckets
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      timeout: 300000
      repositories:
        enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://oauth2-server.synthi-ai.com
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://oauth2-server.synthi-ai.com/.well-known/jwks.json}
          audiences:
          - ${FUSIONAUTH_APP_ID}
      client:
        registration:
          fusionauth:
            client-id: ${FUSIONAUTH_CLIENT_ID}
            client-secret: ${FUSIONAUTH_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope:
            - openid
            - email
            - profile
            - phone
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
        provider:
          fusionauth:
            issuer-uri:
            - ${FUSIONAUTH_ISSUER_URI:https://oauth2-server.synthi-ai.com}
            authorization-uri: https://oauth2-server.synthi-ai.com/oauth2/authorize
            token-uri: https://oauth2-server.synthi-ai.com/oauth2/token
            user-info-uri: https://oauth2-server.synthi-ai.com/oauth2/userinfo
            jwk-set-uri: https://oauth2-server.synthi-ai.com/.well-known/jwks.json
            user-name-attribute: phone
fusionauth:
  apiKey: ${FUSIONAUTH_API_KEY}
  applicationId: ${FUSIONAUTH_APP_ID}
  baseUrl: https://oauth2-server.synthi-ai.com
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}
  verification:
    service-sid: ${TWILIO_VERIFICATION_SERVICE_SID}
bucket4j:
  enabled: true
  filters:
  - cache-name: buckets
    url: /api/v1/auth.*
    rate-limits:
    - bandwidth:
        capacity: 5
        time: 1
        unit: minutes
      cache-key: getHost()
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization}
  allow-credentials: true
  max-age: 3600
