spring:
  application:
    name: driver-management-service
  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@20.116.218.195:27017/driver_management_dev
      auto-index-creation: true
    redis:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 6379
      timeout: 2000
      password: ${REDIS_DEV_PASSWORD}
  kafka:
    consumer:
      group-id: driver-management-group-dev
      properties:
        spring.json.trusted.packages: com.agriconnect.*
    bootstrap-servers: 20.116.218.195:9092
    producer:
      properties:
        spring.json.type.mapping: driverEvent:com.agriconnect.drivermanagement.kafka.model.DriverEvent
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false
  cloud:
    config:
      uri: https://20.116.218.195:8888
      fail-fast: true
      retry:
        initial-interval: 1500
        multiplier: 1.5
        max-attempts: 6
        max-interval: 5000
    consul:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: ${CONSUL_PORT:443}
      scheme: ${CONSUL_SCHEME:https}
      enabled: true
      discovery:
        enabled: true
        service-id: driver-management-service-dev
        instance-id: driver-management-service-dev
        health-check-interval: 10s
        tags:
        - version=1.0-dev
        - environment=development
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://20.116.218.195:9020
          jwk-set-uri: http://20.116.218.195:9020/.well-known/jwks.json
          audiences:
          - dev-driver-management-service
server:
  port: 8081
  servlet:
    context-path: /api/v1
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
feign:
  circuitbreaker:
    enabled: true
resilience4j:
  circuitbreaker:
    instances:
      userService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      userService:
        waitDuration: 1s
        retryExceptions:
        - java.io.IOException
        - java.net.ConnectException
        maxRetryAttempts: 3
kafka:
  topics:
    driver-created: driver.created.dev
    driver-updated: driver.updated.dev
    driver-status-changed: driver.status_changed.dev
    driver-location-updated: driver.location_updated.dev
    driver-assigned: driver.assigned.dev
    driver-availability-changed: driver.availability_changed.dev
  consumer:
    topics:
      logistics-driver-needed: logistics.driver_needed.dev
      vehicle-assigned: vehicle.assigned_to_driver.dev
      delivery-completed: delivery.completed.dev
      delivery-cancelled: delivery.cancelled.dev
      incident-reported: incident.reported.dev
grpc:
  server:
    port: 9090
  client:
    logistics-service:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 9091
    transport-service:
      host: ${CONSUL_HOST:consul.synthi-ai.org}
      port: 9092
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    mongodb:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  exposed-headers: '*'
  allow-credentials: true
  max-age: 3600
logging:
  level:
    root: DEBUG
    com.agriconnect: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    org.springframework.cloud.consul: DEBUG
    org.springframework.cloud.openfeign: DEBUG
  pattern:
    console: '%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint}
      %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}'
