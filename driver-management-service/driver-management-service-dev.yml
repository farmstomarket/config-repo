spring:
  application:
    name: driver-management-service

  data:
    mongodb:
      uri: mongodb://${DEV_MONGO_USERNAME}:${DEV_MONGO_PASSWORD}@dev-mongo.synthi-ai.org:27017/driver_management_dev
      auto-index-creation: true
    redis:
      host: dev-redis.synthi-ai.org
      port: 6379
      password: ${REDIS_DEV_PASSWORD}
      timeout: 2000

  cloud:
    config:
      uri: https://dev-config.synthi-ai.org:8888
      fail-fast: true
      retry:
        initial-interval: 1500
        multiplier: 1.5
        max-attempts: 6
        max-interval: 5000
    consul:
      host: dev-consul.synthi-ai.org
      port: 8500
      scheme: https
      enabled: true
      discovery:
        enabled: true
        service-id: driver-management-service-dev
        instance-id: driver-management-service-dev
        health-check-interval: 10s
        tags:
          - version=1.0-dev
          - environment=development

  kafka:
    bootstrap-servers: dev-kafka.synthi-ai.org:9092
    producer:
      properties:
        spring.json.type.mapping: driverEvent:com.agriconnect.drivermanagement.kafka.model.DriverEvent
    consumer:
      group-id: driver-management-group-dev
      properties:
        spring.json.trusted.packages: com.agriconnect.*

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-oauth2.synthi-ai.com
          jwk-set-uri: https://dev-oauth2.synthi-ai.com/.well-known/jwks.json
          audiences:
            - dev-driver-management-service

server:
  port: 8081
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    mongodb:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      userService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      userService:
        maxRetryAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - java.io.IOException
          - java.net.ConnectException

kafka:
  topics:
    driver-created: driver.created.dev
    driver-updated: driver.updated.dev
    driver-status-changed: driver.status_changed.dev
    driver-location-updated: driver.location_updated.dev
    driver-assigned: driver.assigned.dev
    driver-availability-changed: driver.availability_changed.dev
  consumer:
    topics:
      logistics-driver-needed: logistics.driver_needed.dev
      vehicle-assigned: vehicle.assigned_to_driver.dev
      delivery-completed: delivery.completed.dev
      delivery-cancelled: delivery.cancelled.dev
      incident-reported: incident.reported.dev

grpc:
  server:
    port: 9090
  client:
    logistics-service:
      host: dev-logistics.synthi-ai.org
      port: 9091
    transport-service:
      host: dev-transport.synthi-ai.org
      port: 9092

cors:
  allowed-origins: http://localhost:3000,http://localhost:4200,https://dev-app.farmstomarket.io
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  exposed-headers: "*"
  allow-credentials: true
  max-age: 3600

logging:
  level:
    root: DEBUG
    com.agriconnect: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.security: DEBUG
    org.springframework.cloud.consul: DEBUG
    org.springframework.cloud.openfeign: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"